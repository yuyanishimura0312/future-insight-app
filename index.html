<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>未来洞察支援アプリ</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-hover: #222636;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --text: #e8e8ee;
    --text-muted: #8b8fa3;
    --border: #2d3043;
    --P: #e74c3c; --E: #f39c12; --S: #2ecc71; --T: #3498db; --L: #9b59b6; --En: #1abc9c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, #1a1d27 0%, #2d1f4e 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  header h1 { font-size: 1.3rem; font-weight: 700; }
  header h1 span { color: var(--accent-light); }
  .header-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--text); font-size: 0.8rem; cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent-light); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-accent:hover { background: #5a4bd6; }

  /* Layout */
  .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

  /* Tabs */
  .tab-nav {
    display: flex; gap: 0; margin-bottom: 24px;
    border-bottom: 2px solid var(--border);
  }
  .tab-btn {
    padding: 12px 24px; border: none; background: none;
    font-size: 0.85rem; color: var(--text-muted); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent-light); border-bottom-color: var(--accent); font-weight: 600; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Stats */
  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 20px;
  }
  .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-value { font-size: 1.6rem; font-weight: 700; color: var(--accent-light); margin-top: 4px; }
  .stat-sub { font-size: 0.7rem; color: var(--text-muted); }

  /* PESTLE Grid */
  .pestle-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 16px; margin-bottom: 24px;
  }

  .pestle-section {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden;
  }
  .pestle-header {
    padding: 14px 18px; font-weight: 700; font-size: 0.9rem;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .pestle-badge {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .pestle-count {
    margin-left: auto; font-size: 0.75rem; color: var(--text-muted); font-weight: 400;
  }

  .article-list { max-height: 400px; overflow-y: auto; }
  .article-item {
    padding: 10px 18px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s;
  }
  .article-item:hover { background: var(--card-hover); }
  .article-item:last-child { border-bottom: none; }
  .article-title { font-size: 0.82rem; font-weight: 500; line-height: 1.4; }
  .article-meta {
    font-size: 0.7rem; color: var(--text-muted); margin-top: 3px;
    display: flex; gap: 8px; align-items: center;
  }
  .article-source { color: var(--accent-light); }
  .lang-badge {
    font-size: 0.6rem; padding: 1px 5px; border-radius: 3px;
    background: var(--border); color: var(--text-muted);
  }

  /* Papers */
  .papers-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 16px;
  }
  .paper-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .paper-header {
    padding: 14px 18px; font-weight: 700; font-size: 0.9rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .paper-item {
    padding: 10px 18px; border-bottom: 1px solid var(--border); transition: background 0.1s;
  }
  .paper-item:hover { background: var(--card-hover); }
  .paper-title { font-size: 0.82rem; font-weight: 500; }
  .paper-authors { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
  .paper-field-badge {
    font-size: 0.65rem; padding: 2px 8px; border-radius: 4px;
    background: var(--accent); color: white; opacity: 0.8;
  }

  /* Search */
  .search-bar {
    display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .search-input {
    flex: 1; min-width: 200px; padding: 10px 16px;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 0.85rem;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  /* Detail Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 1000; justify-content: center; align-items: center; padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    max-width: 640px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 28px;
  }
  .modal h2 { font-size: 1.1rem; margin-bottom: 16px; color: var(--accent-light); }
  .modal-field { margin-bottom: 12px; }
  .modal-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
  .modal-value { font-size: 0.85rem; }
  .modal-value a { color: var(--accent-light); text-decoration: none; }
  .modal-value a:hover { text-decoration: underline; }
  .modal-close {
    float: right; background: none; border: none; color: var(--text-muted);
    font-size: 1.2rem; cursor: pointer;
  }
  .modal-close:hover { color: var(--text); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 900px) {
    .pestle-grid, .papers-grid { grid-template-columns: 1fr; }
    header { flex-direction: column; gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1><span>&#9670;</span> 未来洞察支援アプリ</h1>
    <div class="header-sub">Future Insight Support — PESTLE × Academic Papers × CLA</div>
  </div>
  <div class="header-actions">
    <span id="lastUpdated" style="font-size:0.75rem;color:var(--text-muted)"></span>
  </div>
</header>

<div class="container">

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
    <button class="tab-btn" onclick="switchTab('pestle')">PESTLE ニュース</button>
    <button class="tab-btn" onclick="switchTab('papers')">学術論文</button>
    <button class="tab-btn" onclick="switchTab('search')">横断検索</button>
  </div>

  <!-- ===== OVERVIEW ===== -->
  <div class="tab-panel active" id="tab-overview">
    <div class="stats-row" id="overviewStats"></div>

    <h3 style="font-size:0.9rem;color:var(--text-muted);margin-bottom:14px">PESTLE サマリー</h3>
    <div class="pestle-grid" id="overviewPestle"></div>

    <h3 style="font-size:0.9rem;color:var(--text-muted);margin:24px 0 14px">注目の学術論文</h3>
    <div class="papers-grid" id="overviewPapers"></div>
  </div>

  <!-- ===== PESTLE ===== -->
  <div class="tab-panel" id="tab-pestle">
    <div class="search-bar">
      <input class="search-input" id="pestleSearch" placeholder="ニュースを検索..." oninput="renderPestle()">
    </div>
    <div class="pestle-grid" id="pestleGrid"></div>
  </div>

  <!-- ===== PAPERS ===== -->
  <div class="tab-panel" id="tab-papers">
    <div class="search-bar">
      <input class="search-input" id="papersSearch" placeholder="論文を検索..." oninput="renderPapers()">
    </div>
    <div class="papers-grid" id="papersGrid"></div>
  </div>

  <!-- ===== SEARCH ===== -->
  <div class="tab-panel" id="tab-search">
    <div class="search-bar">
      <input class="search-input" id="globalSearch" placeholder="ニュース・論文を横断検索..." oninput="renderGlobalSearch()">
    </div>
    <div id="searchResults"></div>
  </div>

</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2 id="modalTitle"></h2>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// === Data (injected by build script) ===
let NEWS_DATA = null;
let PAPERS_DATA = [];

const PESTLE_META = {
  Political:      { ja: '政治',   color: 'var(--P)',  icon: '&#127987;' },
  Economic:       { ja: '経済',   color: 'var(--E)',  icon: '&#128200;' },
  Social:         { ja: '社会',   color: 'var(--S)',  icon: '&#128101;' },
  Technological:  { ja: '技術',   color: 'var(--T)',  icon: '&#128300;' },
  Legal:          { ja: '法律',   color: 'var(--L)',  icon: '&#9878;' },
  Environmental:  { ja: '環境',   color: 'var(--En)', icon: '&#127793;' },
};

const FIELD_COLORS = {
  '人文学': '#e74c3c', '社会科学': '#f39c12', '自然科学': '#2ecc71',
  '工学': '#3498db', '芸術': '#9b59b6',
};

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// === Tab switching ===
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

// === Modal ===
function openModal(title, bodyHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('detailModal').classList.add('active');
}
function closeModal() { document.getElementById('detailModal').classList.remove('active'); }
document.getElementById('detailModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// === Article detail ===
function showArticle(category, idx) {
  const a = NEWS_DATA.pestle[category].articles[idx];
  const meta = PESTLE_META[category];
  openModal(a.title, `
    <div class="modal-field">
      <div class="modal-label">カテゴリ</div>
      <div class="modal-value" style="color:${meta.color}">${meta.ja} (${category})</div>
    </div>
    <div class="modal-field">
      <div class="modal-label">ソース</div>
      <div class="modal-value">${esc(a.source)} ${a.lang === 'ja' ? '🇯🇵' : '🌐'}</div>
    </div>
    ${a.published ? `<div class="modal-field"><div class="modal-label">公開日</div><div class="modal-value">${esc(a.published)}</div></div>` : ''}
    <div class="modal-field">
      <div class="modal-label">要約</div>
      <div class="modal-value">${esc(a.summary)}</div>
    </div>
    <div class="modal-field">
      <div class="modal-label">リンク</div>
      <div class="modal-value"><a href="${esc(a.url)}" target="_blank">${esc(a.url)}</a></div>
    </div>
    <div class="modal-field">
      <div class="modal-label">関連度スコア</div>
      <div class="modal-value">${a.relevance_score}</div>
    </div>
  `);
}

function showPaper(idx) {
  const p = PAPERS_DATA[idx];
  openModal(p.title, `
    <div class="modal-field">
      <div class="modal-label">分野</div>
      <div class="modal-value"><span class="paper-field-badge" style="background:${FIELD_COLORS[p.field] || 'var(--accent)'}">${esc(p.field)}</span>${p.subfield ? ' / ' + esc(p.subfield) : ''}</div>
    </div>
    <div class="modal-field">
      <div class="modal-label">著者</div>
      <div class="modal-value">${esc(p.authors || '不明')}</div>
    </div>
    <div class="modal-field">
      <div class="modal-label">要約</div>
      <div class="modal-value">${esc(p.summary)}</div>
    </div>
    ${p.published_date ? `<div class="modal-field"><div class="modal-label">公開日</div><div class="modal-value">${esc(p.published_date)}</div></div>` : ''}
    <div class="modal-field">
      <div class="modal-label">リンク</div>
      <div class="modal-value"><a href="${esc(p.source_url)}" target="_blank">${esc(p.source_url)}</a></div>
    </div>
    ${p.doi ? `<div class="modal-field"><div class="modal-label">DOI</div><div class="modal-value"><a href="https://doi.org/${esc(p.doi)}" target="_blank">${esc(p.doi)}</a></div></div>` : ''}
  `);
}

// === Render Overview ===
function renderOverview() {
  if (!NEWS_DATA) return;

  const totalNews = Object.values(NEWS_DATA.pestle).reduce((s, c) => s + c.count, 0);
  const totalPapers = PAPERS_DATA.length;
  const sources = new Set();
  Object.values(NEWS_DATA.pestle).forEach(c => c.articles.forEach(a => sources.add(a.source)));
  const fields = {};
  PAPERS_DATA.forEach(p => { fields[p.field] = (fields[p.field] || 0) + 1; });

  document.getElementById('overviewStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">PESTLEニュース</div><div class="stat-value">${totalNews}</div><div class="stat-sub">6分野 × 20件</div></div>
    <div class="stat-card"><div class="stat-label">学術論文</div><div class="stat-value">${totalPapers}</div><div class="stat-sub">5分野</div></div>
    <div class="stat-card"><div class="stat-label">ニュースソース</div><div class="stat-value">${sources.size}</div><div class="stat-sub">世界各国メディア</div></div>
    <div class="stat-card"><div class="stat-label">収集日</div><div class="stat-value" style="font-size:1rem">${NEWS_DATA.date}</div><div class="stat-sub">${NEWS_DATA.total_fetched}件から選定</div></div>
    <div class="stat-card"><div class="stat-label">論文分野</div><div class="stat-value">${Object.keys(fields).length}</div><div class="stat-sub">${Object.entries(fields).map(([f,n]) => f + ':' + n).join(', ')}</div></div>
  `;

  // PESTLE summary (top 3 per category)
  let pestleHtml = '';
  for (const [cat, meta] of Object.entries(PESTLE_META)) {
    const info = NEWS_DATA.pestle[cat];
    if (!info) continue;
    pestleHtml += `
      <div class="pestle-section">
        <div class="pestle-header">
          <div class="pestle-badge" style="background:${meta.color}"></div>
          ${meta.icon} ${meta.ja}
          <span class="pestle-count">${info.count}件</span>
        </div>
        <div class="article-list">
          ${info.articles.slice(0, 3).map((a, i) => `
            <div class="article-item" onclick="showArticle('${cat}', ${i})">
              <div class="article-title">${esc(a.title)}</div>
              <div class="article-meta">
                <span class="article-source">${esc(a.source)}</span>
                <span class="lang-badge">${a.lang === 'ja' ? 'JA' : 'EN'}</span>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }
  document.getElementById('overviewPestle').innerHTML = pestleHtml;

  // Papers summary (top 2 per field)
  let papersHtml = '';
  const byField = {};
  PAPERS_DATA.forEach((p, i) => { if (!byField[p.field]) byField[p.field] = []; byField[p.field].push({...p, _idx: i}); });

  for (const [field, papers] of Object.entries(byField)) {
    papersHtml += `
      <div class="paper-section">
        <div class="paper-header">
          <span class="paper-field-badge" style="background:${FIELD_COLORS[field] || 'var(--accent)'}">${esc(field)}</span>
          <span class="pestle-count">${papers.length}件</span>
        </div>
        ${papers.slice(0, 2).map(p => `
          <div class="paper-item" style="cursor:pointer" onclick="showPaper(${p._idx})">
            <div class="paper-title">${esc(p.title)}</div>
            <div class="paper-authors">${esc((p.authors || '').substring(0, 80))}${(p.authors || '').length > 80 ? '...' : ''}</div>
          </div>
        `).join('')}
      </div>`;
  }
  document.getElementById('overviewPapers').innerHTML = papersHtml;
}

// === Render PESTLE ===
function renderPestle() {
  if (!NEWS_DATA) return;
  const q = (document.getElementById('pestleSearch').value || '').toLowerCase();

  let html = '';
  for (const [cat, meta] of Object.entries(PESTLE_META)) {
    const info = NEWS_DATA.pestle[cat];
    if (!info) continue;
    const filtered = q ? info.articles.filter(a => (a.title + a.summary + a.source).toLowerCase().includes(q)) : info.articles;

    html += `
      <div class="pestle-section">
        <div class="pestle-header">
          <div class="pestle-badge" style="background:${meta.color}"></div>
          ${meta.icon} ${meta.ja} (${cat})
          <span class="pestle-count">${filtered.length}件</span>
        </div>
        <div class="article-list">
          ${filtered.map((a, i) => {
            const origIdx = info.articles.indexOf(a);
            return `
              <div class="article-item" onclick="showArticle('${cat}', ${origIdx})">
                <div class="article-title">${esc(a.title)}</div>
                <div class="article-meta">
                  <span class="article-source">${esc(a.source)}</span>
                  <span class="lang-badge">${a.lang === 'ja' ? 'JA' : 'EN'}</span>
                  <span>score: ${a.relevance_score}</span>
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }
  document.getElementById('pestleGrid').innerHTML = html;
}

// === Render Papers ===
function renderPapers() {
  const q = (document.getElementById('papersSearch').value || '').toLowerCase();
  const byField = {};
  PAPERS_DATA.forEach((p, i) => {
    if (q && !(p.title + p.summary + p.authors + p.field).toLowerCase().includes(q)) return;
    if (!byField[p.field]) byField[p.field] = [];
    byField[p.field].push({...p, _idx: i});
  });

  let html = '';
  for (const [field, papers] of Object.entries(byField)) {
    html += `
      <div class="paper-section">
        <div class="paper-header">
          <span class="paper-field-badge" style="background:${FIELD_COLORS[field] || 'var(--accent)'}">${esc(field)}</span>
          <span class="pestle-count">${papers.length}件</span>
        </div>
        <div class="article-list">
          ${papers.map(p => `
            <div class="paper-item" style="cursor:pointer" onclick="showPaper(${p._idx})">
              <div class="paper-title">${esc(p.title)}</div>
              <div class="paper-authors">${esc((p.authors || '').substring(0, 100))}</div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }
  document.getElementById('papersGrid').innerHTML = html || '<div style="color:var(--text-muted);padding:20px;">検索結果がありません</div>';
}

// === Global Search ===
function renderGlobalSearch() {
  const q = (document.getElementById('globalSearch').value || '').toLowerCase();
  if (!q || q.length < 2) {
    document.getElementById('searchResults').innerHTML = '<div style="color:var(--text-muted);padding:20px;">2文字以上で検索してください</div>';
    return;
  }

  let results = [];

  // Search news
  if (NEWS_DATA) {
    for (const [cat, info] of Object.entries(NEWS_DATA.pestle)) {
      info.articles.forEach((a, i) => {
        if ((a.title + a.summary).toLowerCase().includes(q)) {
          results.push({ type: 'news', category: cat, title: a.title, sub: a.source, idx: i });
        }
      });
    }
  }

  // Search papers
  PAPERS_DATA.forEach((p, i) => {
    if ((p.title + p.summary + p.authors).toLowerCase().includes(q)) {
      results.push({ type: 'paper', category: p.field, title: p.title, sub: (p.authors || '').substring(0, 60), idx: i });
    }
  });

  let html = `<div style="color:var(--text-muted);font-size:0.8rem;margin-bottom:12px">${results.length}件見つかりました</div>`;
  results.forEach(r => {
    const color = r.type === 'news' ? (PESTLE_META[r.category]?.color || 'var(--accent)') : (FIELD_COLORS[r.category] || 'var(--accent)');
    const badge = r.type === 'news' ? (PESTLE_META[r.category]?.ja || r.category) : r.category;
    const onclick = r.type === 'news' ? `showArticle('${r.category}', ${r.idx})` : `showPaper(${r.idx})`;
    html += `
      <div class="article-item" style="background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="${onclick}">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:0.65rem;padding:2px 8px;border-radius:4px;background:${color};color:white">${esc(badge)}</span>
          <span class="lang-badge">${r.type === 'news' ? 'NEWS' : 'PAPER'}</span>
        </div>
        <div class="article-title" style="margin-top:4px">${esc(r.title)}</div>
        <div class="article-meta">${esc(r.sub)}</div>
      </div>`;
  });

  document.getElementById('searchResults').innerHTML = html;
}

// === Load data ===
async function loadData() {
  try {
    const newsResp = await fetch('data/latest.json');
    NEWS_DATA = await newsResp.json();
    document.getElementById('lastUpdated').textContent = `最終更新: ${NEWS_DATA.date}`;
  } catch (e) {
    console.warn('News data not found:', e);
  }

  try {
    const papersResp = await fetch('data/papers.json');
    PAPERS_DATA = await papersResp.json();
  } catch (e) {
    console.warn('Papers data not found:', e);
  }

  renderOverview();
  renderPestle();
  renderPapers();
}

loadData();
</script>
