<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>未来洞察支援アプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f0e9e1;
    --card: #ffffff;
    --card-hover: #faf5f0;
    --accent: #783c28;
    --accent-light: #a0503c;
    --accent-warm: #c87864;
    --text: #292929;
    --text-muted: #8c6d5e;
    --border: #e0d5cc;
    --highlight: #fc4545;
    --P: #b92a38; --E: #cd8a32; --S: #4a8c5c; --T: #2c8acc; --L: #7c5a96; --En: #3a8c78;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "M PLUS 1p", "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, #783c28 0%, #a0503c 50%, #c87864 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    padding-top: max(20px, env(safe-area-inset-top));
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #ffffff;
  }

  header h1 { font-size: 1.3rem; font-weight: 700; color: #ffffff; }
  header h1 span { color: #ffe8d7; }
  .header-sub { font-size: 0.75rem; color: #ffe8d7; margin-top: 2px; opacity: 0.85; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--text); font-size: 0.8rem; cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent-light); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-accent:hover { background: var(--accent-light); }

  /* Layout */
  .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

  /* Tabs */
  .tab-nav {
    display: flex; gap: 0; margin-bottom: 24px;
    border-bottom: 2px solid var(--border);
  }
  .tab-btn {
    padding: 12px 24px; border: none; background: none;
    font-size: 0.85rem; color: var(--text-muted); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Stats */
  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 20px;
  }
  .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-value { font-size: 1.6rem; font-weight: 700; color: var(--accent); margin-top: 4px; }
  .stat-sub { font-size: 0.7rem; color: var(--text-muted); }

  /* PESTLE Grid */
  .pestle-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(min(420px, 100%), 1fr));
    gap: 16px; margin-bottom: 24px;
  }

  .pestle-section {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; transition: box-shadow 0.15s;
  }
  .pestle-section:hover { box-shadow: 0 4px 16px rgba(120,60,40,0.08); }
  .pestle-header {
    padding: 14px 18px; font-weight: 700; font-size: 0.9rem;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
    color: #fff;
  }
  .pestle-badge {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    background: rgba(255,255,255,0.8);
  }
  .pestle-count {
    margin-left: auto; font-size: 0.75rem; color: rgba(255,255,255,0.85); font-weight: 400;
  }

  /* PESTLE dimension filter */
  .pestle-dim-filters { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .pestle-dim-btn {
    padding: 5px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s; border: 2px solid;
  }
  .pestle-dim-btn.active { color: #fff; }
  .pestle-dim-btn:not(.active) { background: var(--card); }

  /* Trend chart container */
  .pestle-chart-container {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 20px;
  }
  .pestle-chart-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
  }
  .pestle-chart-title { font-size: 0.9rem; font-weight: 700; color: var(--accent); }
  .pestle-chart-range {
    display: flex; gap: 4px;
  }
  .pestle-chart-range button {
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--card); color: var(--text-muted); font-size: 0.72rem;
    cursor: pointer; transition: all 0.15s;
  }
  .pestle-chart-range button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .article-list { max-height: 400px; overflow-y: auto; }
  .article-item {
    padding: 10px 18px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s;
  }
  .article-item:hover { background: var(--card-hover); }
  .article-item:last-child { border-bottom: none; }
  .article-title { font-size: 0.82rem; font-weight: 500; line-height: 1.4; }
  .article-snippet {
    font-size: 0.73rem; color: var(--text-muted); margin-top: 3px;
    line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .article-meta {
    font-size: 0.7rem; color: var(--text-muted); margin-top: 3px;
    display: flex; gap: 8px; align-items: center;
  }
  .article-source { color: var(--accent); font-weight: 500; }
  .article-relevance {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 0.65rem; color: var(--text-muted);
  }
  .article-relevance-bar {
    width: 40px; height: 4px; border-radius: 2px; background: var(--border); overflow: hidden;
  }
  .article-relevance-fill { height: 100%; border-radius: 2px; }
  .lang-badge {
    font-size: 0.6rem; padding: 1px 5px; border-radius: 3px;
    background: #ffe8d7; color: var(--accent);
  }

  /* Papers */
  .papers-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(min(420px, 100%), 1fr));
    gap: 16px;
  }
  .paper-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .paper-header {
    padding: 14px 18px; font-weight: 700; font-size: 0.9rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .paper-item {
    padding: 10px 18px; border-bottom: 1px solid var(--border); transition: background 0.1s;
  }
  .paper-item:hover { background: var(--card-hover); }
  .paper-title { font-size: 0.82rem; font-weight: 500; }
  .paper-authors { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
  .paper-field-badge {
    font-size: 0.65rem; padding: 2px 8px; border-radius: 4px;
    background: var(--accent); color: white; opacity: 0.8;
  }

  /* Search */
  .search-bar {
    display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .search-input {
    flex: 1; min-width: 200px; padding: 10px 16px;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 0.85rem;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  /* Detail Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(41,29,23,0.5);
    z-index: 1000; justify-content: center; align-items: center; padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    max-width: 640px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 28px;
  }
  .modal h2 { font-size: 1.1rem; margin-bottom: 16px; color: var(--accent); }
  .modal-field { margin-bottom: 12px; }
  .modal-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
  .modal-value { font-size: 0.85rem; }
  .modal-value a { color: #2c8acc; text-decoration: none; }
  .modal-value a:hover { text-decoration: underline; }
  .modal-close {
    float: right; background: none; border: none; color: var(--text-muted);
    font-size: 1.2rem; cursor: pointer;
  }
  .modal-close:hover { color: var(--text); }
  .modal-swipe-handle {
    display: none; width: 36px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 0 auto 12px;
  }
  @media (max-width: 480px) {
    .modal-swipe-handle { display: block; }
  }

  /* CLA */
  .cla-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(420px, 100%), 1fr)); gap: 16px; margin-bottom: 24px; }
  .cla-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .cla-cat-header { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .cla-layer { margin-bottom: 12px; padding-left: 14px; border-left: 3px solid var(--border); }
  .cla-layer-label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
  .cla-layer-text { font-size: 0.82rem; line-height: 1.6; }
  .cla-layer.litany { border-color: var(--accent-warm); }
  .cla-layer.systemic { border-color: var(--accent-light); }
  .cla-layer.worldview { border-color: var(--accent); }
  .cla-layer.myth { border-color: #2c8acc; }
  .cla-tension { font-size: 0.8rem; color: var(--highlight); margin-top: 8px; font-style: italic; }
  .cla-narrative { font-size: 0.8rem; color: var(--accent); margin-top: 4px; }

  /* Weak Signals */
  .signals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(380px, 100%), 1fr)); gap: 14px; }
  .signal-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; transition: box-shadow 0.15s; }
  .signal-card:hover { box-shadow: 0 4px 12px rgba(120,60,40,0.1); }
  .signal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .signal-name { font-size: 0.9rem; font-weight: 700; color: var(--accent); }
  .signal-impact { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .signal-impact.high { background: #fde8e8; color: #b92a38; }
  .signal-impact.medium { background: #fff3e0; color: #cd8a32; }
  .signal-impact.low { background: #e8f5e9; color: #4a8c5c; }
  .signal-desc { font-size: 0.82rem; color: var(--text); margin-bottom: 8px; line-height: 1.6; }
  .signal-meta { display: flex; gap: 6px; flex-wrap: wrap; font-size: 0.7rem; }
  .signal-horizon { background: #ffe8d7; color: var(--accent); padding: 2px 8px; border-radius: 4px; }
  .signal-counter { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; font-style: italic; }

  /* Translation toggle */
  .translate-btn { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; background: #ffe8d7; color: var(--accent); border: none; cursor: pointer; }
  .translate-btn:hover { background: var(--accent); color: white; }
  .translated-text { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; font-style: italic; display: none; }
  .translated-text.show { display: block; }

  /* Alerts */
  .alerts-panel {
    margin-bottom: 24px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden;
  }
  .alerts-panel-header {
    padding: 14px 18px; font-weight: 700; font-size: 0.95rem;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, #fdf0e8 0%, var(--card) 100%);
  }
  .alerts-panel-header .alert-total-badge {
    margin-left: auto; font-size: 0.7rem; font-weight: 600;
    padding: 2px 10px; border-radius: 10px;
    background: var(--highlight); color: white;
  }
  .alert-list { max-height: 480px; overflow-y: auto; }
  .alert-item {
    padding: 12px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px;
    transition: background 0.1s;
  }
  .alert-item:hover { background: var(--card-hover); }
  .alert-item:last-child { border-bottom: none; }
  .alert-icon {
    flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
  }
  .alert-icon.emergence { background: #fde8e8; }
  .alert-icon.surge { background: #fff3e0; }
  .alert-icon.crossover { background: #e8f0ff; }
  .alert-body { flex: 1; min-width: 0; }
  .alert-topic {
    font-size: 0.88rem; font-weight: 700; color: var(--accent);
    display: flex; align-items: center; gap: 6px;
  }
  .alert-type-badge {
    font-size: 0.6rem; padding: 1px 6px; border-radius: 4px;
    font-weight: 600; text-transform: uppercase;
  }
  .alert-type-badge.emergence { background: #fde8e8; color: #b92a38; }
  .alert-type-badge.surge { background: #fff3e0; color: #cd8a32; }
  .alert-type-badge.crossover { background: #e8f0ff; color: #2c68a0; }
  .alert-desc { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; line-height: 1.5; }
  .alert-cats { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
  .alert-cat-tag {
    font-size: 0.6rem; padding: 1px 6px; border-radius: 3px;
    background: #ffe8d7; color: var(--accent);
  }

  /* Alert badge on PESTLE headers */
  .pestle-alert-badge {
    font-size: 0.6rem; padding: 1px 6px; border-radius: 8px;
    background: rgba(255,255,255,0.9); color: var(--highlight); font-weight: 600;
    animation: alert-pulse 2s ease-in-out infinite;
  }
  @keyframes alert-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d5c4b8; border-radius: 3px; }

  /* Responsive - tablet */
  @media (max-width: 900px) {
    .pestle-grid, .papers-grid, .cla-grid, .signals-grid { grid-template-columns: 1fr; }
    header { flex-direction: column; gap: 10px; }
  }

  /* Responsive - mobile */
  @media (max-width: 480px) {
    /* Prevent text size adjustment on orientation change */
    body { -webkit-text-size-adjust: 100%; }

    /* Header: compact, single line */
    header { padding: 12px 16px; }
    header h1 { font-size: 1rem; }
    .header-sub { font-size: 0.6rem; display: none; }
    .header-actions { gap: 6px; }
    #lastUpdated { font-size: 0.65rem !important; }

    /* Container: tighter padding */
    .container { padding: 12px 10px; }

    /* Tab nav: pill-style horizontal scroll */
    .tab-nav {
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; white-space: nowrap;
      gap: 4px; flex-wrap: nowrap;
      border-bottom: none;
      padding-bottom: 8px;
      margin-bottom: 16px;
    }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 8px 14px; font-size: 0.75rem; flex-shrink: 0;
      border-radius: 20px; border-bottom: none; margin-bottom: 0;
      background: var(--card); border: 1px solid var(--border);
    }
    .tab-btn.active {
      background: var(--accent); color: white;
      border-color: var(--accent); border-bottom-color: var(--accent);
    }

    /* Grids: single column, tighter gaps */
    .pestle-grid, .papers-grid, .cla-grid, .signals-grid { grid-template-columns: 1fr; gap: 10px; }

    /* Stats: 2-column, compact */
    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
    .stat-card { padding: 10px 12px; border-radius: 8px; }
    .stat-value { font-size: 1.2rem; }
    .stat-label { font-size: 0.65rem; }

    /* PESTLE sections */
    .pestle-section { border-radius: 10px; }
    .pestle-header { padding: 12px 14px; font-size: 0.85rem; }
    .article-list { max-height: 300px; }

    /* Articles: larger tap targets */
    .article-item { padding: 12px 14px; min-height: 44px; }
    .article-title { font-size: 0.82rem; line-height: 1.5; }
    .article-meta { font-size: 0.68rem; margin-top: 4px; }

    /* Papers */
    .paper-section { border-radius: 10px; }
    .paper-header { padding: 12px 14px; }
    .paper-item { padding: 12px 14px; min-height: 44px; }
    .paper-title { font-size: 0.82rem; line-height: 1.5; }
    .paper-authors { font-size: 0.68rem; }

    /* CLA */
    .cla-card { padding: 14px; border-radius: 10px; }
    .cla-cat-header { font-size: 0.88rem; margin-bottom: 10px; }
    .cla-layer { padding-left: 10px; margin-bottom: 10px; }
    .cla-layer-text { font-size: 0.8rem; }

    /* Signals */
    .signal-card { padding: 14px; border-radius: 10px; }
    .signal-name { font-size: 0.85rem; }
    .signal-desc { font-size: 0.8rem; }

    /* Search: full width, touch-friendly */
    .search-bar { gap: 8px; flex-direction: column; }
    .search-input {
      min-width: 0; width: 100%; padding: 12px 14px;
      font-size: 16px; /* Prevents iOS auto-zoom on focus */
      border-radius: 10px;
    }

    /* Modal: near full-screen on mobile */
    .modal-overlay { padding: 0; align-items: flex-end; }
    .modal {
      padding: 20px 16px; border-radius: 16px 16px 0 0;
      max-height: 92vh; width: 100%; max-width: 100%;
    }
    .modal h2 { font-size: 1rem; margin-bottom: 12px; padding-right: 30px; }
    .modal-value { font-size: 0.82rem; line-height: 1.6; }
    .modal-close { font-size: 1.5rem; padding: 8px; }

    /* Alerts: compact, touch-friendly */
    .alerts-panel { border-radius: 10px; }
    .alerts-panel-header { padding: 12px 14px; font-size: 0.88rem; }
    .alert-list { max-height: 360px; }
    .alert-item { padding: 12px 14px; gap: 10px; min-height: 44px; }
    .alert-icon { width: 28px; height: 28px; font-size: 0.8rem; }
    .alert-topic { font-size: 0.82rem; }
    .alert-desc { font-size: 0.75rem; }

    /* Buttons: touch-friendly min size */
    .btn { padding: 8px 14px; font-size: 0.75rem; min-height: 36px; }
    .translate-btn { padding: 4px 10px; min-height: 28px; }

    /* Section headings */
    h3[style] { font-size: 0.85rem !important; }

    /* Smooth scrolling for iOS */
    .article-list, .alert-list { -webkit-overflow-scrolling: touch; }
  }

  /* Extra small screens (iPhone SE etc.) */
  @media (max-width: 360px) {
    header h1 { font-size: 0.9rem; }
    .tab-btn { padding: 7px 10px; font-size: 0.7rem; }
    .stat-card { padding: 8px 10px; }
    .stat-value { font-size: 1.1rem; }
    .container { padding: 10px 8px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1><span>&#9670;</span> <span data-i18n="app_title">未来洞察支援アプリ</span></h1>
    <div class="header-sub" data-i18n="app_sub">Future Insight Support — PESTLE × Academic Papers × CLA</div>
  </div>
  <div class="header-actions">
    <span id="lastUpdated" style="font-size:0.75rem;color:#ffe8d7;opacity:0.85"></span>
    <button class="btn" style="background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3);color:white;font-size:0.75rem" onclick="toggleLang()" id="langToggleBtn">EN</button>
  </div>
</header>

<div class="container">

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('overview')" data-i18n="tab_overview">概要</button>
    <button class="tab-btn" onclick="switchTab('pestle')" data-i18n="tab_pestle">PESTLEニュース</button>
    <button class="tab-btn" onclick="switchTab('papers')" data-i18n="tab_papers">学術論文</button>
    <button class="tab-btn" onclick="switchTab('cla')" data-i18n="tab_cla">CLA分析</button>
    <button class="tab-btn" onclick="switchTab('signals')" data-i18n="tab_signals">ウィークシグナル</button>
    <button class="tab-btn" onclick="switchTab('search')" data-i18n="tab_search">横断検索</button>
  </div>

  <!-- ===== OVERVIEW ===== -->
  <div class="tab-panel active" id="tab-overview">
    <div class="stats-row" id="overviewStats"></div>

    <!-- Alert Panel -->
    <div id="alertsPanel"></div>

  Political:      { ja: '政治',   color: '#b92a38', icon: '&#127987;' },
  Economic:       { ja: '経済',   color: '#cd8a32', icon: '&#128200;' },

};

// === PESTLE Trend Chart ===
let pestleChart = null;
let pestleChartRange = '5y';
let pestleDimVisible = { Political: true, Economic: true, Social: true, Technological: true, Legal: true, Environmental: true };

function setPestleChartRange(range) {
  pestleChartRange = range;
  document.querySelectorAll('#pestleChartRange button').forEach(b => b.classList.remove('active'));
  document.querySelector(`#pestleChartRange button[onclick*="${range}"]`)?.classList.add('active');
  renderPestleChart();
}

function togglePestleDim(dim) {
  pestleDimVisible[dim] = !pestleDimVisible[dim];
  renderPestleDimFilters();
  renderPestle();
  renderPestleChart();
}

function renderPestleDimFilters() {
  const container = document.getElementById('pestleDimFilters');
  if (!container) return;
  let html = '';
  for (const [cat, meta] of Object.entries(PESTLE_META)) {
    const active = pestleDimVisible[cat];
    html += `<button class="pestle-dim-btn ${active ? 'active' : ''}" style="border-color:${meta.color};${active ? 'background:' + meta.color : 'color:' + meta.color}" onclick="togglePestleDim('${cat}')">${meta.ja}</button>`;
  }
  container.innerHTML = html;
}

function renderPestleChart() {
  const idx = PESTLE_HISTORY?._index;
  if (!idx) return;

  const quarters = Object.keys(idx).filter(k => /^\d{4}Q\d$/.test(k)).sort();
  if (quarters.length === 0) return;

  // Apply range filter
  let filtered = quarters;
  const now = new Date();
  const currentYear = now.getFullYear();
  if (pestleChartRange === '5y') {
    filtered = quarters.filter(q => parseInt(q) >= currentYear - 5);
  } else if (pestleChartRange === '10y') {
    filtered = quarters.filter(q => parseInt(q) >= currentYear - 10);
  }

  const labels = filtered.map(q => q.replace('Q', ' Q'));

  const datasets = [];
  for (const [cat, meta] of Object.entries(PESTLE_META)) {
    if (!pestleDimVisible[cat]) continue;
    datasets.push({
      label: meta.ja,
      data: filtered.map(q => idx[q]?.[cat] || 0),
      borderColor: meta.color,
      backgroundColor: meta.color + '18',
      borderWidth: 2,
      pointRadius: filtered.length > 40 ? 0 : 3,
      pointHoverRadius: 5,
      tension: 0.3,
      fill: false,
    });
  }

  const canvas = document.getElementById('pestleTrendChart');
  if (!canvas) return;

  if (pestleChart) pestleChart.destroy();

  pestleChart = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'bottom', labels: { usePointStyle: true, pointStyle: 'circle', padding: 16, font: { size: 11 } } },
        tooltip: { backgroundColor: 'rgba(41,29,23,0.9)', titleFont: { size: 12 }, bodyFont: { size: 11 } },
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 }, maxTicksLimit: 20 } },
        y: { beginAtZero: true, grid: { color: '#e0d5cc40' }, ticks: { font: { size: 10 } } },
      },
    },
  });
}

const FIELD_COLORS = {
  '人文学': '#b92a38', '社会科学': '#cd8a32', '自然科学': '#4a8c5c',
  '工学': '#2c8acc', '芸術': '#7c5a96',
};

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// === Tab switching ===
const VALID_TABS = ['overview','pestle','papers','cla','signals','search'];
function switchTab(name, pushState) {
  if (!VALID_TABS.includes(name)) name = 'overview';
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  const btns = document.querySelectorAll('.tab-btn');
  const idx = VALID_TABS.indexOf(name);
  if (idx >= 0 && btns[idx]) btns[idx].classList.add('active');
  if (pushState !== false) history.replaceState(null, '', '#' + name);
}
// Restore tab from URL hash on load & back/forward
function restoreTabFromHash() {
  const hash = location.hash.replace('#', '');
  if (VALID_TABS.includes(hash)) switchTab(hash, false);
}
window.addEventListener('hashchange', restoreTabFromHash);

// === Modal ===
function openModal(title, bodyHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('detailModal').classList.add('active');
}
function closeModal() { document.getElementById('detailModal').classList.remove('active'); }
document.getElementById('detailModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Swipe-down to close modal on mobile
(function() {
  const modal = document.querySelector('#detailModal .modal');
  let startY = 0, currentY = 0, dragging = false;
  modal.addEventListener('touchstart', e => {
    if (modal.scrollTop <= 0) { startY = e.touches[0].clientY; dragging = true; }
  }, { passive: true });
  modal.addEventListener('touchmove', e => {
    if (!dragging) return;
    currentY = e.touches[0].clientY;
    const diff = currentY - startY;
    if (diff > 0) { modal.style.transform = `translateY(${diff}px)`; modal.style.transition = 'none'; }
  }, { passive: true });
  modal.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    const diff = currentY - startY;
    modal.style.transition = 'transform 0.2s ease';
    if (diff > 100) { closeModal(); }
    modal.style.transform = '';
  });
})();

async function showPaper(idx) {
  const p = PAPERS_DATA[idx];
  // Load full data on first click
  if (!PAPERS_FULL) {
    openModal(p.title, `<div style="padding:20px;color:var(--text-muted)">詳細データを読み込み中...</div>`);
    try {
      const resp = await fetch('data/papers.json?v=' + Date.now());
      PAPERS_FULL = await resp.json();
    } catch (e) {
      openModal(p.title, `<div style="padding:20px">
        <div class="modal-field"><div class="modal-label">${t('field')}</div><div class="modal-value">${esc(p.field)}</div></div>
        <div class="modal-field"><div class="modal-label">${t('authors')}</div><div class="modal-value">${esc(p.authors || t('unknown'))}</div></div>
        <div class="modal-field"><div class="modal-label">${t('link')}</div><div class="modal-value"><a href="${esc(p.source_url)}" target="_blank">${esc(p.source_url)}</a></div></div>
      </div>`);
      return;
    }
  }
  const full = PAPERS_FULL[idx] || p;
  const displayTitle = localizedPaperTitle(full, idx);
  const displaySummary = localizedPaperSummary(full, idx);
  openModal(displayTitle, `
    <div class="modal-field">
      <div class="modal-label">${t('field')}</div>
      <div class="modal-value"><span class="paper-field-badge" style="background:${FIELD_COLORS[full.field] || 'var(--accent)'}">${esc(full.field)}</span>${full.subfield ? ' / ' + esc(full.subfield) : ''}</div>
    </div>
    <div class="modal-field">
      <div class="modal-label">${t('authors')}</div>
      <div class="modal-value">${esc(full.authors || t('unknown'))}</div>
    </div>
    <div class="modal-field">
      <div class="modal-label">${t('summary')}</div>
      <div class="modal-value">${esc(displaySummary)}</div>
    </div>
    ${(full.language || 'en') === 'en' && LANG === 'ja' && PAPERS_TRANS[idx] ? `<div class="modal-field"><div class="modal-label">Original</div><div class="modal-value" style="font-size:0.78rem;color:var(--text-muted)">${esc(full.title)}<br>${esc(full.summary)}</div></div>` : ''}
    ${full.published_date ? `<div class="modal-field"><div class="modal-label">${t('published')}</div><div class="modal-value">${esc(full.published_date)}</div></div>` : ''}
    <div class="modal-field">
      <div class="modal-label">${t('link')}</div>
      <div class="modal-value"><a href="${esc(full.source_url)}" target="_blank">${esc(full.source_url)}</a></div>
    </div>
    ${full.doi ? `<div class="modal-field"><div class="modal-label">DOI</div><div class="modal-value"><a href="https://doi.org/${esc(full.doi)}" target="_blank">${esc(full.doi)}</a></div></div>` : ''}
  `);
}

        <span style="font-size:0.75rem;font-weight:400;color:var(--text-muted);margin-left:8px">${t('alerts_desc')}</span>
        <span class="alert-total-badge">${alerts.length}</span>
      </div>
      <div class="alert-list">`;

  for (const a of alerts) {
    const typeCls = a.type.toLowerCase();
    const icon = icons[a.type] || '\u26a0\ufe0f';
    const typeLabel = typeLabels[a.type] || a.type;
    const desc = LANG === 'ja' ? a.description : (a.description_en || a.description);

    let detail = '';
    if (a.type === 'SURGE' && a.ratio) {
      detail = `<span style="color:var(--highlight);font-weight:600">${a.ratio}${t('alert_ratio')}</span>`;
    } else if (a.type === 'EMERGENCE') {
      detail = `<span style="color:#b92a38;font-weight:600">${a.mentions}${t('alert_mentions')}</span>`;
    } else if (a.type === 'CROSSOVER') {
      detail = `<span style="color:#2c68a0;font-weight:600">${a.n_categories} categories</span>`;
    }

    const catTags = (a.categories || []).map(c => {
      const label = LANG === 'ja' ? (catJa[c] || c) : c;
      const color = catColors[c] || 'var(--accent)';
      return `<span class="alert-cat-tag" style="border-left:2px solid ${color}">${label}</span>`;
    }).join('');

    const title = LANG === 'ja' ? (a.alert_title || a.topic) : (a.alert_title_en || a.topic);

    html += `
      <div class="alert-item">
        <div class="alert-icon ${typeCls}">${icon}</div>
        <div class="alert-body">
          <div class="alert-topic">
            ${esc(title)}
            <span class="alert-type-badge ${typeCls}">${typeLabel}</span>
            ${detail}
          </div>
          <div class="alert-desc">${esc(desc)}</div>
          <div class="alert-cats">${catTags}</div>
        </div>
      </div>`;
  }

  html += '</div></div>';
  panel.innerHTML = html;
}

// Count alerts per PESTLE category for badge display
function getAlertCountByCategory() {
  if (!ALERTS_DATA || !ALERTS_DATA.alerts) return {};
  const counts = {};
  for (const a of ALERTS_DATA.alerts) {
    for (const cat of (a.categories || [])) {
      counts[cat] = (counts[cat] || 0) + 1;
    }
  }
  return counts;
}

function renderOverview() {
  if (!NEWS_DATA) return;

  const totalNews = Object.values(NEWS_DATA.pestle).reduce((s, c) => s + c.count, 0);
  const totalPapers = PAPERS_DATA.length;
  const sources = new Set();
  Object.values(NEWS_DATA.pestle).forEach(c => c.articles.forEach(a => sources.add(a.source)));
  const fields = {};
  PAPERS_DATA.forEach(p => { fields[p.field] = (fields[p.field] || 0) + 1; });

  // Historical total from pestle_index (sum of all quarter counts)
  const historyQuarters = PESTLE_HISTORY?._quarterCount || 0;
  let historyTotal = 0;
  if (PESTLE_HISTORY?._index) {
    for (const cats of Object.values(PESTLE_HISTORY._index)) {
      if (typeof cats === 'object') historyTotal += Object.values(cats).reduce((s, n) => s + (typeof n === 'number' ? n : 0), 0);
    }
  }
  const newsTotal = historyTotal || totalNews;
  const papersTotal = PAPERS_STATS?.total || PAPERS_DATA.length;

  document.getElementById('overviewStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">${t('stat_news')}</div><div class="stat-value">${newsTotal.toLocaleString()}</div><div class="stat-sub">${historyQuarters > 0 ? '1990年〜 ' + historyQuarters + '四半期' : t('stat_sub_news')}</div></div>
    <div class="stat-card"><div class="stat-label">${t('stat_papers')}</div><div class="stat-value">${papersTotal.toLocaleString()}</div><div class="stat-sub">${Object.keys(PAPERS_STATS?.by_field || fields).length} ${t('field')}</div></div>
    <div class="stat-card"><div class="stat-label">${t('stat_sources')}</div><div class="stat-value">${sources.size}</div><div class="stat-sub">${t('stat_sub_sources')}</div></div>
    <div class="stat-card"><div class="stat-label">${t('stat_date')}</div><div class="stat-value" style="font-size:1rem">${NEWS_DATA.date}</div><div class="stat-sub">${NEWS_DATA.total_fetched}件から${totalNews}件選定</div></div>
    <div class="stat-card"><div class="stat-label">${t('stat_fields')}</div><div class="stat-value">${Object.keys(fields).length}</div><div class="stat-sub">${Object.entries(fields).map(([f,n]) => f + ':' + n).join(', ')}</div></div>
  `;

  // PESTLE summary (top 3 per category)
  let pestleHtml = '';
  for (const [cat, meta] of Object.entries(PESTLE_META)) {
    const info = NEWS_DATA.pestle[cat];
    if (!info) continue;
    const alertCounts = getAlertCountByCategory();
    const alertBadge = alertCounts[cat] ? `<span class="pestle-alert-badge">\u26a0 ${alertCounts[cat]}</span>` : '';
    pestleHtml += `
      <div class="pestle-section">
        <div class="pestle-header" style="background:linear-gradient(135deg, ${meta.color} 0%, ${meta.color}cc 100%)">
          <div class="pestle-badge"></div>
          ${meta.icon} ${meta.ja} ${alertBadge}
          <span class="pestle-count">${info.count}件</span>
        </div>
        <div class="article-list">
          ${info.articles.slice(0, 3).map((a, i) => `
            <div class="article-item" onclick="showArticle('${cat}', ${i})">
              <div class="article-title">${esc(localizedTitle(a, cat, i))}</div>
              <div class="article-meta">
                <span class="article-source">${esc(a.source)}</span>
                ${a.published_date ? `<span style="font-size:0.7rem;color:var(--text-muted)">${esc(a.published_date)}</span>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }
  document.getElementById('overviewPestle').innerHTML = pestleHtml;

  // Papers summary (top 2 per field)
  let papersHtml = '';
  const byField = {};
  PAPERS_DATA.forEach((p, i) => { if (!byField[p.field]) byField[p.field] = []; byField[p.field].push({...p, _idx: i}); });

  for (const [field, papers] of Object.entries(byField)) {

      <div class="paper-section">
        <div class="paper-header">

// === Render PESTLE ===
async function ensurePestleHistoryLoaded() {
  if (_pestleHistoryLoaded) return;
  try {
    const resp = await fetch('data/pestle_history.json?v=' + Date.now());
    const full = await resp.json();
    PESTLE_HISTORY = { ...PESTLE_HISTORY, ...full };
    _pestleHistoryLoaded = true;
  } catch (e) { console.warn('Failed to load history:', e); }
}

async function renderPestle() {
  if (!NEWS_DATA) return;
  const q = (document.getElementById('pestleSearch').value || '').toLowerCase();
  const yearFilter = document.getElementById('pestleYearFilter')?.value || 'latest';

  // Lazy load full history when needed
  if (yearFilter !== 'latest' && !_pestleHistoryLoaded) {
    document.getElementById('pestleGrid').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">データを読み込み中...</div>';
    await ensurePestleHistoryLoaded();
  }

  // Populate year filter from index
  const sel = document.getElementById('pestleYearFilter');
  const idx = PESTLE_HISTORY?._index;
  if (sel && sel.options.length <= 2 && idx) {
    const years = new Set();
    Object.keys(idx).forEach(qk => { if (qk.length >= 4) years.add(qk.substring(0, 4)); });
    [...years].sort().reverse().forEach(y => {
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y + '年';
      sel.appendChild(opt);
    });
  }

  // Build article data based on filter — always use PESTLE_HISTORY when available
  let pestleData = {};
  const langFilter = (a) => !a.lang || a.lang === 'ja' || a.lang === 'en';

  if (PESTLE_HISTORY && _pestleHistoryLoaded) {
    const validQs = Object.keys(PESTLE_HISTORY).filter(k => /^\d{4}Q\d$/.test(k)).sort();
    for (const qk of validQs) {
      if (yearFilter !== 'all' && yearFilter !== 'latest' && !qk.startsWith(yearFilter)) continue;
      if (yearFilter === 'latest' && qk !== validQs[validQs.length - 1]) continue;
      const cats = PESTLE_HISTORY[qk];
      for (const [cat, info] of Object.entries(cats)) {
        if (!pestleData[cat]) pestleData[cat] = [];
        pestleData[cat].push(...(info.articles || []));
      }
    }
  }
  // Use NEWS_DATA for "latest" view (no need for heavy history file)
  if ((yearFilter === 'latest' || Object.keys(pestleData).length === 0) && NEWS_DATA) {
    pestleData = {};
    for (const [cat, info] of Object.entries(NEWS_DATA.pestle)) {
      pestleData[cat] = (info.articles || []);
    }
  }

  // Render dimension filters
  renderPestleDimFilters();

  let totalCount = 0;
  let html = '';
  for (const [cat, meta] of Object.entries(PESTLE_META)) {
    if (!pestleDimVisible[cat]) continue;
    let articles = pestleData[cat] || [];
    if (q) articles = articles.filter(a => ((a.title||'') + (a.summary||'') + (a.source||'')).toLowerCase().includes(q));
    totalCount += articles.length;

    // Sort by date desc
    articles.sort((a, b) => ((b.published_date||'').localeCompare(a.published_date||'')));

    html += `
      <div class="pestle-section">
        <div class="pestle-header" style="background:linear-gradient(135deg, ${meta.color} 0%, ${meta.color}cc 100%)">
          <div class="pestle-badge"></div>
          ${meta.icon} <strong>${meta.ja}</strong>
          <span class="pestle-count">${articles.length.toLocaleString()}件</span>
        </div>
        <div class="article-list">
          ${articles.slice(0, 50).map((a, i) => {
            const title = (yearFilter === 'latest') ? localizedTitle(a, cat, i) : a.title;
            const summary = (yearFilter === 'latest') ? localizedSummary(a, cat, i) : (a.summary || '');
            const snippet = (summary || '').substring(0, 120);
            const relScore = a.relevance_score || 0;
            const relPct = Math.min(relScore / 10 * 100, 100);
            return `
              <div class="article-item" ${yearFilter === 'latest' ? `onclick="showArticle('${cat}', ${i})"` : (a.url ? `onclick="window.open('${esc(a.url)}','_blank')" style="cursor:pointer"` : '')}>
                <div class="article-title">${esc(title)}</div>
                ${snippet ? `<div class="article-snippet">${esc(snippet)}${summary.length > 120 ? '...' : ''}</div>` : ''}
                <div class="article-meta">
                  <span class="article-source">${esc(a.source)}</span>
                  ${a.published_date ? `<span>${esc(a.published_date)}</span>` : ''}
                  ${relScore ? `<span class="article-relevance"><span class="article-relevance-bar"><span class="article-relevance-fill" style="width:${relPct}%;background:${meta.color}"></span></span>${relScore}</span>` : ''}
                </div>
              </div>`;
          }).join('')}
          ${articles.length > 50 ? `<div style="padding:10px;text-align:center;color:var(--text-muted);font-size:0.8rem">他 ${(articles.length - 50).toLocaleString()}件</div>` : ''}
        </div>
      </div>`;
  }

  const countEl = document.getElementById('pestleTotalCount');
  if (countEl) countEl.textContent = `計 ${totalCount.toLocaleString()}件`;
  document.getElementById('pestleGrid').innerHTML = html;
}

// === Render Papers ===
function renderPapers() {
  const q = (document.getElementById('papersSearch').value || '').toLowerCase();
  const decade = document.getElementById('papersDecade').value;
  const fieldFilter = document.getElementById('papersField').value;
  const byField = {};
  let totalShown = 0;

  PAPERS_DATA.forEach((p, i) => {
    if (q && !(p.title + p.summary + p.authors + p.field).toLowerCase().includes(q)) return;
    if (fieldFilter && p.field !== fieldFilter) return;
    if (decade) {
      const yr = parseInt((p.published_date || '').substring(0, 4));
      const d = parseInt(decade);
      if (isNaN(yr) || yr < d || yr >= d + 10) return;
    }
    if (!byField[p.field]) byField[p.field] = [];
    byField[p.field].push({...p, _idx: i});
    totalShown++;
  });

  // Stats bar
  const statsEl = document.getElementById('papersStats');
  if (statsEl) {
    const parts = [];
    for (const [f, ps] of Object.entries(byField)) parts.push(`${f}: ${ps.length}`);
    statsEl.textContent = `${totalShown.toLocaleString()}件表示 (${parts.join(' / ')})`;
  }

  let html = '';
  const fieldOrder = ['人文学', '社会科学', '自然科学', '工学', '芸術'];
  const sortedFields = Object.entries(byField).sort((a, b) => fieldOrder.indexOf(a[0]) - fieldOrder.indexOf(b[0]));

  for (const [field, papers] of sortedFields) {
    // Sort by date descending within each field
    papers.sort((a, b) => (b.published_date || '').localeCompare(a.published_date || ''));
    // Limit display to 200 per field for performance
    const shown = papers.slice(0, 200);
    const hasMore = papers.length > 200;
    html += `
      <div class="paper-section">
        <div class="paper-header">
          <span class="paper-field-badge" style="background:${FIELD_COLORS[field] || 'var(--accent)'}">${esc(field)}</span>
          <span class="pestle-count">${papers.length}件</span>
        </div>
        <div class="article-list">
          ${shown.map(p => `
            <div class="paper-item" style="cursor:pointer" onclick="showPaper(${p._idx})">
              <div class="paper-title">${esc(localizedPaperTitle(p, p._idx))}</div>
              <div class="paper-authors">${esc((p.authors || '').substring(0, 100))} ${p.published_date ? `<span style="color:var(--text-muted);font-size:0.7rem">(${esc(p.published_date)})</span>` : ''}</div>
            </div>
          `).join('')}
          ${hasMore ? `<div style="padding:8px 12px;color:var(--text-muted);font-size:0.8rem;">...他 ${papers.length - 200}件（検索やフィルタで絞り込めます）</div>` : ''}
        </div>
      </div>`;
  }
  document.getElementById('papersGrid').innerHTML = html || `<div style="color:var(--text-muted);padding:20px;">${t('no_results')}</div>`;
}

// === Global Search ===
function renderGlobalSearch() {
  const q = (document.getElementById('globalSearch').value || '').toLowerCase();
  if (!q || q.length < 2) {
    document.getElementById('searchResults').innerHTML = `<div style="color:var(--text-muted);padding:20px;">${t('search_min')}</div>`;
    return;
  }

  let results = [];

  // Search news (search both original and translated text)
  if (NEWS_DATA) {
    for (const [cat, info] of Object.entries(NEWS_DATA.pestle)) {
      info.articles.forEach((a, i) => {
        const tr = getTranslation(cat, i);
        const searchText = [a.title, a.summary, tr?.title_translated, tr?.summary_translated].filter(Boolean).join(' ').toLowerCase();
        if (searchText.includes(q)) {
          results.push({ type: 'news', category: cat, title: localizedTitle(a, cat, i), sub: a.source, idx: i });
        }
      });
    }
  }

  // Search papers (search both original and translated text)
  PAPERS_DATA.forEach((p, i) => {
    const ptr = PAPERS_TRANS[i];
    const searchText = [p.title, p.summary, p.authors, ptr?.title_ja, ptr?.summary_ja].filter(Boolean).join(' ').toLowerCase();
    if (searchText.includes(q)) {
      results.push({ type: 'paper', category: p.field, title: localizedPaperTitle(p, i), sub: (p.authors || '').substring(0, 60), idx: i });
    }
  });

  let html = `<div style="color:var(--text-muted);font-size:0.8rem;margin-bottom:12px">${results.length}${t('found')}</div>`;
  results.forEach(r => {
    const color = r.type === 'news' ? (PESTLE_META[r.category]?.color || 'var(--accent)') : (FIELD_COLORS[r.category] || 'var(--accent)');
    const badge = r.type === 'news' ? (PESTLE_META[r.category]?.ja || r.category) : r.category;
    const onclick = r.type === 'news' ? `showArticle('${r.category}', ${r.idx})` : `showPaper(${r.idx})`;
    html += `
      <div class="article-item" style="background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="${onclick}">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:0.65rem;padding:2px 8px;border-radius:4px;background:${color};color:white">${esc(badge)}</span>
          <span class="lang-badge">${r.type === 'news' ? 'NEWS' : 'PAPER'}</span>
        </div>
        <div class="article-title" style="margin-top:4px">${esc(r.title)}</div>
        <div class="article-meta">${esc(r.sub)}</div>
      </div>`;
  });

  document.getElementById('searchResults').innerHTML = html;
}

// === Render CLA ===
let claCatFilter = 'Overall'; // Default to Overall
let claViewMode = 'timeline'; // 'single' or 'timeline'

function renderCLA() {
  if (!AI_DATA || !AI_DATA.cla) {
    document.getElementById('claGrid').innerHTML = `<div style="color:var(--text-muted);padding:20px;">${t('no_ai')}</div>`;
    return;
  }

  // Collect all available quarters, sorted chronologically
  const qcla = AI_DATA.quarterly_cla || {};
  const quarters = Object.keys(qcla).sort();
  if (quarters.length === 0) quarters.push(AI_DATA.date?.slice(0,7) || '2026-03');

  // Category options: Overall + 6 PESTLE
  const catOptions = [
    { key: 'Overall', label: '全体', icon: '🌐', color: 'var(--accent)' },
    ...Object.entries(PESTLE_META).map(([k, m]) => ({ key: k, label: m.ja, icon: m.icon, color: m.color }))
  ];

  let html = '';

  // Category filter
  html += `<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
    <span style="font-size:0.82rem;color:var(--text-muted);font-weight:600">分野:</span>`;
  catOptions.forEach(opt => {
    const isActive = claCatFilter === opt.key;
    html += `<button onclick="claCatFilter='${opt.key}';renderCLA()" style="padding:5px 12px;border:1px solid ${isActive ? opt.color : 'var(--border)'};border-radius:6px;background:${isActive ? opt.color : 'var(--card)'};color:${isActive ? '#fff' : 'var(--text)'};cursor:pointer;font-size:0.8rem">${opt.icon} ${opt.label}</button>`;
  });
  html += `</div>`;

  // View mode toggle
  html += `<div style="display:flex;gap:6px;margin-bottom:16px;align-items:center">
    <span style="font-size:0.82rem;color:var(--text-muted);font-weight:600">表示:</span>
    <button onclick="claViewMode='timeline';renderCLA()" style="padding:5px 12px;border:1px solid ${claViewMode==='timeline'?'var(--accent)':'var(--border)'};border-radius:6px;background:${claViewMode==='timeline'?'var(--accent)':'var(--card)'};color:${claViewMode==='timeline'?'#fff':'var(--text)'};cursor:pointer;font-size:0.8rem">📊 変遷一覧</button>
    <button onclick="claViewMode='single';renderCLA()" style="padding:5px 12px;border:1px solid ${claViewMode==='single'?'var(--accent)':'var(--border)'};border-radius:6px;background:${claViewMode==='single'?'var(--accent)':'var(--card)'};color:${claViewMode==='single'?'#fff':'var(--text)'};cursor:pointer;font-size:0.8rem">📋 個別表示</button>
  </div>`;

  if (claViewMode === 'timeline') {
    // === Horizontal timeline comparison (card-based) ===
    const layers = [
      { key: 'litany', label: t('layer1'), border: 'var(--accent-warm)' },
      { key: 'systemic_causes', label: t('layer2'), border: 'var(--accent-light)' },
      { key: 'worldview', label: t('layer3'), border: 'var(--accent)' },
      { key: 'myth_metaphor', label: t('layer4'), border: '#2c8acc' },
      { key: 'key_tension', label: '⚡ 核心的緊張', border: 'var(--highlight)' },
      { key: 'emerging_narrative', label: '→ 新たな物語', border: 'var(--S)' },
    ];

    layers.forEach(layer => {
      html += `<div style="margin-bottom:20px">`;
      html += `<div style="font-size:0.88rem;font-weight:700;color:var(--accent);margin-bottom:8px;padding-left:4px;border-left:3px solid ${layer.border}">${layer.label}</div>`;
      html += `<div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:8px">`;
      quarters.forEach(q => {
        const data = qcla[q];
        const catData = data ? data[claCatFilter] : null;
        const text = catData ? (catData[layer.key] || '') : '';
        const label = (q.includes('-') ? q.replace('-0', '年').replace('-1', '年1').replace('-', '年') + '月' : q + '年');
        const isCurrent = q === quarters[quarters.length - 1];
        html += `<div style="min-width:240px;max-width:300px;flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;${isCurrent ? 'border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)' : ''}">
          <div style="font-size:0.75rem;font-weight:600;color:${isCurrent ? 'var(--accent)' : 'var(--text-muted)'};margin-bottom:6px">${label}${isCurrent ? '（現在）' : ''}</div>
          <div style="font-size:0.8rem;line-height:1.6;color:var(--text)">${esc(text) || '<span style="color:var(--text-muted)">—</span>'}</div>
        </div>`;
      });
      html += `</div></div>`;
    });

  } else {
    // === Single quarter view ===
    html += `<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
      <span style="font-size:0.82rem;color:var(--text-muted);font-weight:600">期間:</span>`;
    quarters.forEach((q, i) => {
      const isActive = i === (window._claSingleIdx || quarters.length - 1);
      const label = (q.includes('-') ? q.replace('-0', '年').replace('-1', '年1').replace('-', '年') + '月' : q + '年');
      html += `<button onclick="window._claSingleIdx=${i};renderCLA()" style="padding:5px 12px;border:1px solid ${isActive ? 'var(--accent)' : 'var(--border)'};border-radius:6px;background:${isActive ? 'var(--accent)' : 'var(--card)'};color:${isActive ? '#fff' : 'var(--text)'};cursor:pointer;font-size:0.8rem">${label}</button>`;
    });
    html += `</div>`;

    const selIdx = window._claSingleIdx ?? quarters.length - 1;
    const selQ = quarters[selIdx];
    const data = qcla[selQ] || (selIdx === quarters.length - 1 ? AI_DATA.cla : null);

    if (!data || !data[claCatFilter]) {
      html += `<div style="padding:24px;text-align:center;color:var(--text-muted);background:var(--card);border-radius:10px;">データなし</div>`;
    } else {
      const cla = data[claCatFilter];
      const opt = catOptions.find(o => o.key === claCatFilter);
      html += `
        <div class="cla-card">
          <div class="cla-cat-header">
            <div class="pestle-badge" style="background:${opt?.color || 'var(--accent)'}"></div>
            ${opt?.icon || ''} ${opt?.label || claCatFilter}
            <span style="font-size:0.72rem;color:var(--text-muted);margin-left:auto">${selQ}</span>
          </div>
          <div class="cla-layer litany">
            <div class="cla-layer-label">${t('layer1')}</div>
            <div class="cla-layer-text">${esc(cla.litany || '')}</div>
          </div>
          <div class="cla-layer systemic">
            <div class="cla-layer-label">${t('layer2')}</div>
            <div class="cla-layer-text">${esc(cla.systemic_causes || '')}</div>
          </div>
          <div class="cla-layer worldview">
            <div class="cla-layer-label">${t('layer3')}</div>
            <div class="cla-layer-text">${esc(cla.worldview || '')}</div>
          </div>
          <div class="cla-layer myth">
            <div class="cla-layer-label">${t('layer4')}</div>
            <div class="cla-layer-text">${esc(cla.myth_metaphor || '')}</div>
          </div>
          ${cla.key_tension ? `<div class="cla-tension">⚡ ${esc(cla.key_tension)}</div>` : ''}
          ${cla.emerging_narrative ? `<div class="cla-narrative">→ ${esc(cla.emerging_narrative)}</div>` : ''}
        </div>`;
    }
  }
  document.getElementById('claGrid').innerHTML = html;
}

// === Render Weak Signals ===
let signalsShowAll = false;
function renderSignals() {
  if (!AI_DATA || !AI_DATA.weak_signals || AI_DATA.weak_signals.length === 0) {
    document.getElementById('signalsGrid').innerHTML = `<div style="color:var(--text-muted);padding:20px;">${t('no_signals')}</div>`;
    return;
  }

  const allSignals = AI_DATA.weak_signals;
  const displaySignals = signalsShowAll ? allSignals : allSignals.slice(0, 100);

  let html = displaySignals.map(s => `
    <div class="signal-card">
      <div class="signal-header">
        <div class="signal-name">${esc(s.signal)}</div>
        <span class="signal-impact ${(s.potential_impact || '').toLowerCase()}">${esc(s.potential_impact || '?')}</span>
      </div>
      <div class="signal-desc">${esc(s.description)}</div>
      <div class="signal-meta">
        ${s.detected_date ? `<span style="font-size:0.7rem;color:var(--text-muted)">📅 ${esc(s.detected_date)}</span>` : ''}
        ${s.source_date ? `<span style="font-size:0.7rem;color:var(--text-muted)">📅 ${esc(s.source_date)}</span>` : ''}
        <span class="signal-horizon">${esc(s.time_horizon || '?')}</span>
        ${(s.pestle_categories || []).map(c => {
          const m = PESTLE_META[c];
          return m ? `<span style="font-size:0.65rem;padding:2px 6px;border-radius:3px;background:${m.color};color:white">${m.ja}</span>` : `<span class="lang-badge">${esc(c)}</span>`;
        }).join('')}
      </div>
      ${s.counter_trend ? `<div class="signal-counter">↔ ${esc(s.counter_trend)}</div>` : ''}
      ${s.related_headlines && s.related_headlines.length > 0 ? `
        <details style="margin-top:8px;font-size:0.75rem;color:var(--text-muted)">
          <summary style="cursor:pointer">関連記事 (${s.related_headlines.length})</summary>
          <ul style="margin-top:4px;padding-left:16px">
            ${s.related_headlines.map(h => `<li>${esc(h)}</li>`).join('')}
          </ul>
        </details>` : ''}
    </div>
  `).join('');

  if (!signalsShowAll && allSignals.length > 100) {
    html += `<div style="text-align:center;padding:20px"><button onclick="signalsShowAll=true;renderSignals()" style="padding:10px 24px;border:1px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;font-size:0.88rem;color:var(--accent)">さらに表示（残り${allSignals.length - 100}件）</button></div>`;
  }

  document.getElementById('signalsGrid').innerHTML = html;
}

// === Translation helpers ===
function getTranslation(cat, idx) {
  if (!AI_DATA || !AI_DATA.translations || !AI_DATA.translations[cat]) return null;
  return AI_DATA.translations[cat].find(t => t.index === idx);
}

function localizedTitle(article, cat, idx) {
  // In JA mode: if article is English, show translated title
  // In EN mode: show original title
  if (LANG === 'ja' && article.lang === 'en') {
    const tr = getTranslation(cat, idx);
    if (tr && tr.title_translated) return tr.title_translated;
  }
  return article.title;
}

function localizedSummary(article, cat, idx) {
  if (LANG === 'ja' && article.lang === 'en') {
    const tr = getTranslation(cat, idx);
    if (tr && tr.summary_translated) return tr.summary_translated;
  }
  return article.summary;
}

function localizedPaperTitle(paper, idx) {
  if (LANG === 'ja' && (paper.language || 'en') === 'en') {
    const tr = PAPERS_TRANS[idx];
    if (tr && tr.title_ja) return tr.title_ja;
  }
  return paper.title;
}

function localizedPaperSummary(paper, idx) {
  if (LANG === 'ja' && (paper.language || 'en') === 'en') {
    const tr = PAPERS_TRANS[idx];
    if (tr && tr.summary_ja) return tr.summary_ja;
  }
  return paper.summary;
}

// === Load data (lazy loading for performance) ===
let PAPERS_STATS = null;
let _pestleHistoryLoaded = false;
let _papersFullLoaded = false;

async function loadData() {
  const v = Date.now();

  // Phase 1: Load lightweight data first (overview needs these)
  const [newsResp, papersLightResp, aiResp, statsResp] = await Promise.allSettled([
    fetch('data/latest.json?v=' + v),
    fetch('data/papers_light.json?v=' + v),
    fetch('data/ai_analysis.json?v=' + v),
    fetch('data/papers_stats.json?v=' + v),
  ]);

  if (newsResp.status === 'fulfilled') {
    NEWS_DATA = await newsResp.value.json();
    document.getElementById('lastUpdated').textContent = `${t('last_updated')}: ${NEWS_DATA.date}`;
  }
  if (papersLightResp.status === 'fulfilled') {
    PAPERS_DATA = await papersLightResp.value.json();
  }
  if (aiResp.status === 'fulfilled') {
    AI_DATA = await aiResp.value.json();
  }
  if (statsResp.status === 'fulfilled') {
    PAPERS_STATS = await statsResp.value.json();
  }

  // Phase 2: Load alerts (small file)
  try {
    const alertsResp = await fetch('data/alerts.json?v=' + v);
    ALERTS_DATA = await alertsResp.json();
  } catch (e) {}

  // Phase 3: Load pestle_index (13KB, for overview stats)
  try {
    const idxResp = await fetch('data/pestle_index.json?v=' + v);
    const idx = await idxResp.json();
    // Store quarter count for stats
    if (!PESTLE_HISTORY) PESTLE_HISTORY = {};
    PESTLE_HISTORY._index = idx;
    PESTLE_HISTORY._quarterCount = Object.keys(idx).length;
  } catch (e) {}

  applyI18n();
  renderOverview();
  renderAlerts();
  renderPestle();
  renderPestleChart();
  renderPapers();
  renderCLA();
  renderSignals();
  restoreTabFromHash();
}

loadData();
</script>
