<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>未来洞察支援アプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0e9e1;
    --card: #ffffff;
    --card-hover: #faf5f0;
    --accent: #783c28;
    --accent-light: #a0503c;
    --accent-warm: #c87864;
    --text: #292929;
    --text-muted: #8c6d5e;
    --border: #e0d5cc;
    --highlight: #fc4545;
    --P: #b92a38; --E: #cd8a32; --S: #4a8c5c; --T: #2c8acc; --L: #7c5a96; --En: #3a8c78;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "M PLUS 1p", "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, #783c28 0%, #a0503c 50%, #c87864 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #ffffff;
  }

  header h1 { font-size: 1.3rem; font-weight: 700; color: #ffffff; }
  header h1 span { color: #ffe8d7; }
  .header-sub { font-size: 0.75rem; color: #ffe8d7; margin-top: 2px; opacity: 0.85; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--text); font-size: 0.8rem; cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent-light); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-accent:hover { background: var(--accent-light); }

  /* Layout */
  .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

  /* Tabs */
  .tab-nav {
    display: flex; gap: 0; margin-bottom: 24px;
    border-bottom: 2px solid var(--border);
  }
  .tab-btn {
    padding: 12px 24px; border: none; background: none;
    font-size: 0.85rem; color: var(--text-muted); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Stats */
  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 20px;
  }
  .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-value { font-size: 1.6rem; font-weight: 700; color: var(--accent); margin-top: 4px; }
  .stat-sub { font-size: 0.7rem; color: var(--text-muted); }

  /* PESTLE Grid */
  .pestle-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 16px; margin-bottom: 24px;
  }

  .pestle-section {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden;
  }
  .pestle-header {
    padding: 14px 18px; font-weight: 700; font-size: 0.9rem;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .pestle-badge {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .pestle-count {
    margin-left: auto; font-size: 0.75rem; color: var(--text-muted); font-weight: 400;
  }

  .article-list { max-height: 400px; overflow-y: auto; }
  .article-item {
    padding: 10px 18px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s;
  }
  .article-item:hover { background: var(--card-hover); }
  .article-item:last-child { border-bottom: none; }
  .article-title { font-size: 0.82rem; font-weight: 500; line-height: 1.4; }
  .article-meta {
    font-size: 0.7rem; color: var(--text-muted); margin-top: 3px;
    display: flex; gap: 8px; align-items: center;
  }
  .article-source { color: var(--accent); font-weight: 500; }
  .lang-badge {
    font-size: 0.6rem; padding: 1px 5px; border-radius: 3px;
    background: #ffe8d7; color: var(--accent);
  }

  /* Papers */
  .papers-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 16px;
  }
  .paper-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .paper-header {
    padding: 14px 18px; font-weight: 700; font-size: 0.9rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .paper-item {
    padding: 10px 18px; border-bottom: 1px solid var(--border); transition: background 0.1s;
  }
  .paper-item:hover { background: var(--card-hover); }
  .paper-title { font-size: 0.82rem; font-weight: 500; }
  .paper-authors { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
  .paper-field-badge {
    font-size: 0.65rem; padding: 2px 8px; border-radius: 4px;
    background: var(--accent); color: white; opacity: 0.8;
  }

  /* Search */
  .search-bar {
    display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .search-input {
    flex: 1; min-width: 200px; padding: 10px 16px;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 0.85rem;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  /* Detail Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(41,29,23,0.5);
    z-index: 1000; justify-content: center; align-items: center; padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    max-width: 640px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 28px;
  }
  .modal h2 { font-size: 1.1rem; margin-bottom: 16px; color: var(--accent); }
  .modal-field { margin-bottom: 12px; }
  .modal-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
  .modal-value { font-size: 0.85rem; }
  .modal-value a { color: #2c8acc; text-decoration: none; }
  .modal-value a:hover { text-decoration: underline; }
  .modal-close {
    float: right; background: none; border: none; color: var(--text-muted);
    font-size: 1.2rem; cursor: pointer;
  }
  .modal-close:hover { color: var(--text); }

  /* CLA */
  .cla-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .cla-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .cla-cat-header { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .cla-layer { margin-bottom: 12px; padding-left: 14px; border-left: 3px solid var(--border); }
  .cla-layer-label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
  .cla-layer-text { font-size: 0.82rem; line-height: 1.6; }
  .cla-layer.litany { border-color: var(--accent-warm); }
  .cla-layer.systemic { border-color: var(--accent-light); }
  .cla-layer.worldview { border-color: var(--accent); }
  .cla-layer.myth { border-color: #2c8acc; }
  .cla-tension { font-size: 0.8rem; color: var(--highlight); margin-top: 8px; font-style: italic; }
  .cla-narrative { font-size: 0.8rem; color: var(--accent); margin-top: 4px; }

  /* Weak Signals */
  .signals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 14px; }
  .signal-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; transition: box-shadow 0.15s; }
  .signal-card:hover { box-shadow: 0 4px 12px rgba(120,60,40,0.1); }
  .signal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .signal-name { font-size: 0.9rem; font-weight: 700; color: var(--accent); }
  .signal-impact { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .signal-impact.high { background: #fde8e8; color: #b92a38; }
  .signal-impact.medium { background: #fff3e0; color: #cd8a32; }
  .signal-impact.low { background: #e8f5e9; color: #4a8c5c; }
  .signal-desc { font-size: 0.82rem; color: var(--text); margin-bottom: 8px; line-height: 1.6; }
  .signal-meta { display: flex; gap: 6px; flex-wrap: wrap; font-size: 0.7rem; }
  .signal-horizon { background: #ffe8d7; color: var(--accent); padding: 2px 8px; border-radius: 4px; }
  .signal-counter { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; font-style: italic; }

  /* Translation toggle */
  .translate-btn { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; background: #ffe8d7; color: var(--accent); border: none; cursor: pointer; }
  .translate-btn:hover { background: var(--accent); color: white; }
  .translated-text { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; font-style: italic; display: none; }
  .translated-text.show { display: block; }

  /* Alerts */
  .alerts-panel {
    margin-bottom: 24px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden;
  }
  .alerts-panel-header {
    padding: 14px 18px; font-weight: 700; font-size: 0.95rem;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, #fdf0e8 0%, var(--card) 100%);
  }
  .alerts-panel-header .alert-total-badge {
    margin-left: auto; font-size: 0.7rem; font-weight: 600;
    padding: 2px 10px; border-radius: 10px;
    background: var(--highlight); color: white;
  }
  .alert-list { max-height: 480px; overflow-y: auto; }
  .alert-item {
    padding: 12px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px;
    transition: background 0.1s;
  }
  .alert-item:hover { background: var(--card-hover); }
  .alert-item:last-child { border-bottom: none; }
  .alert-icon {
    flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
  }
  .alert-icon.emergence { background: #fde8e8; }
  .alert-icon.surge { background: #fff3e0; }
  .alert-icon.crossover { background: #e8f0ff; }
  .alert-body { flex: 1; min-width: 0; }
  .alert-topic {
    font-size: 0.88rem; font-weight: 700; color: var(--accent);
    display: flex; align-items: center; gap: 6px;
  }
  .alert-type-badge {
    font-size: 0.6rem; padding: 1px 6px; border-radius: 4px;
    font-weight: 600; text-transform: uppercase;
  }
  .alert-type-badge.emergence { background: #fde8e8; color: #b92a38; }
  .alert-type-badge.surge { background: #fff3e0; color: #cd8a32; }
  .alert-type-badge.crossover { background: #e8f0ff; color: #2c68a0; }
  .alert-desc { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; line-height: 1.5; }
  .alert-cats { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
  .alert-cat-tag {
    font-size: 0.6rem; padding: 1px 6px; border-radius: 3px;
    background: #ffe8d7; color: var(--accent);
  }

  /* Alert badge on PESTLE headers */
  .pestle-alert-badge {
    font-size: 0.6rem; padding: 1px 6px; border-radius: 8px;
    background: var(--highlight); color: white; font-weight: 600;
    animation: alert-pulse 2s ease-in-out infinite;
  }
  @keyframes alert-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d5c4b8; border-radius: 3px; }

  /* Responsive */
  @media (max-width: 900px) {
    .pestle-grid, .papers-grid { grid-template-columns: 1fr; }
    header { flex-direction: column; gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1><span>&#9670;</span> <span data-i18n="app_title">未来洞察支援アプリ</span></h1>
    <div class="header-sub" data-i18n="app_sub">Future Insight Support — PESTLE × Academic Papers × CLA</div>
  </div>
  <div class="header-actions">
    <span id="lastUpdated" style="font-size:0.75rem;color:#ffe8d7;opacity:0.85"></span>
    <button class="btn" style="background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3);color:white;font-size:0.75rem" onclick="toggleLang()" id="langToggleBtn">EN</button>
  </div>
</header>

<div class="container">

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('overview')" data-i18n="tab_overview">概要</button>
    <button class="tab-btn" onclick="switchTab('pestle')" data-i18n="tab_pestle">PESTLEニュース</button>
    <button class="tab-btn" onclick="switchTab('papers')" data-i18n="tab_papers">学術論文</button>
    <button class="tab-btn" onclick="switchTab('cla')" data-i18n="tab_cla">CLA分析</button>
    <button class="tab-btn" onclick="switchTab('signals')" data-i18n="tab_signals">ウィークシグナル</button>
    <button class="tab-btn" onclick="switchTab('search')" data-i18n="tab_search">横断検索</button>
  </div>

  <!-- ===== OVERVIEW ===== -->
  <div class="tab-panel active" id="tab-overview">
    <div class="stats-row" id="overviewStats"></div>

    <!-- Alert Panel -->
    <div id="alertsPanel"></div>

    <h3 style="font-size:0.9rem;color:var(--text-muted);margin-bottom:14px" data-i18n="pestle_summary">PESTLEサマリー</h3>
    <div class="pestle-grid" id="overviewPestle"></div>

    <h3 style="font-size:0.9rem;color:var(--text-muted);margin:24px 0 14px" data-i18n="featured_papers">注目の学術論文</h3>
    <div class="papers-grid" id="overviewPapers"></div>
  </div>

  <!-- ===== PESTLE ===== -->
  <div class="tab-panel" id="tab-pestle">
    <div class="search-bar">
      <input class="search-input" id="pestleSearch" data-i18n-placeholder="search_news" placeholder="ニュースを検索..." oninput="renderPestle()">
    </div>
    <div class="pestle-grid" id="pestleGrid"></div>
  </div>

  <!-- ===== PAPERS ===== -->
  <div class="tab-panel" id="tab-papers">
    <div class="search-bar">
      <input class="search-input" id="papersSearch" data-i18n-placeholder="search_papers" placeholder="論文を検索..." oninput="renderPapers()">
    </div>
    <div class="papers-grid" id="papersGrid"></div>
  </div>

  <!-- ===== CLA ===== -->
  <div class="tab-panel" id="tab-cla">
    <div style="margin-bottom:16px">
      <h3 style="font-size:1rem;color:var(--accent);margin-bottom:4px" data-i18n="cla_title">因果階層分析（CLA）</h3>
      <p style="font-size:0.8rem;color:var(--text-muted)" data-i18n="cla_desc">PESTLE各分野のニュースを4つの深度で分析: リタニー（表層）→ 社会的原因 → 世界観 → 神話/メタファー</p>
    </div>
    <div id="claGrid"></div>
  </div>

  <!-- ===== WEAK SIGNALS ===== -->
  <div class="tab-panel" id="tab-signals">
    <div style="margin-bottom:16px">
      <h3 style="font-size:1rem;color:var(--accent);margin-bottom:4px" data-i18n="signals_title">ウィークシグナル</h3>
      <p style="font-size:0.8rem;color:var(--text-muted)" data-i18n="signals_desc">ニュースと学術論文から抽出された、将来大きな変化をもたらす可能性のある兆し</p>
    </div>
    <div class="signals-grid" id="signalsGrid"></div>
  </div>

  <!-- ===== SEARCH ===== -->
  <div class="tab-panel" id="tab-search">
    <div class="search-bar">
      <input class="search-input" id="globalSearch" data-i18n-placeholder="search_all" placeholder="ニュース・論文を横断検索..." oninput="renderGlobalSearch()">
    </div>
    <div id="searchResults"></div>
  </div>

</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2 id="modalTitle"></h2>
    <div id="modalBody"></div>
  </div>
</div>

function t(key) { return I18N[LANG][key] || I18N['ja'][key] || key; }

function toggleLang() {
  LANG = LANG === 'ja' ? 'en' : 'ja';
  document.getElementById('langToggleBtn').textContent = LANG === 'ja' ? 'EN' : 'JA';
  applyI18n();
  renderOverview();
  renderAlerts();
  renderPestle();
  renderPapers();
  renderCLA();
  renderSignals();
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (I18N[LANG][key]) el.textContent = I18N[LANG][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (I18N[LANG][key]) el.placeholder = I18N[LANG][key];
  });
  document.title = LANG === 'ja' ? '未来洞察支援アプリ' : 'Future Insight App';
}

};

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// === Tab switching ===
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

// === Modal ===
function openModal(title, bodyHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('detailModal').classList.add('active');
}
function closeModal() { document.getElementById('detailModal').classList.remove('active'); }
document.getElementById('detailModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// === Render Alerts ===
function renderAlerts() {
  const panel = document.getElementById('alertsPanel');
  if (!ALERTS_DATA || !ALERTS_DATA.alerts || ALERTS_DATA.alerts.length === 0) {
    panel.innerHTML = '';
    return;
  }

  const alerts = ALERTS_DATA.alerts;
  const icons = { EMERGENCE: '\u26a0\ufe0f', SURGE: '\ud83d\udcc8', CROSSOVER: '\ud83d\udd00' };
  const typeLabels = { EMERGENCE: t('alert_emergence'), SURGE: t('alert_surge'), CROSSOVER: t('alert_crossover') };
  const catColors = {
    Political: 'var(--P)', Economic: 'var(--E)', Social: 'var(--S)',
    Technological: 'var(--T)', Legal: 'var(--L)', Environmental: 'var(--En)',
  };
  const catJa = {
    Political: '\u653f\u6cbb', Economic: '\u7d4c\u6e08', Social: '\u793e\u4f1a',
    Technological: '\u6280\u8853', Legal: '\u6cd5\u5f8b', Environmental: '\u74b0\u5883',
  };

  let html = `
    <div class="alerts-panel">
      <div class="alerts-panel-header">
        \u26a0\ufe0f ${t('alerts_title')}
        <span style="font-size:0.75rem;font-weight:400;color:var(--text-muted);margin-left:8px">${t('alerts_desc')}</span>
        <span class="alert-total-badge">${alerts.length}</span>
      </div>
      <div class="alert-list">`;

  for (const a of alerts) {
    const typeCls = a.type.toLowerCase();
    const icon = icons[a.type] || '\u26a0\ufe0f';
    const typeLabel = typeLabels[a.type] || a.type;
    const desc = LANG === 'ja' ? a.description : (a.description_en || a.description);

    let detail = '';
    if (a.type === 'SURGE' && a.ratio) {
      detail = `<span style="color:var(--highlight);font-weight:600">${a.ratio}${t('alert_ratio')}</span>`;
    } else if (a.type === 'EMERGENCE') {
      detail = `<span style="color:#b92a38;font-weight:600">${a.mentions}${t('alert_mentions')}</span>`;
    } else if (a.type === 'CROSSOVER') {
      detail = `<span style="color:#2c68a0;font-weight:600">${a.n_categories} categories</span>`;
    }

    const catTags = (a.categories || []).map(c => {
      const label = LANG === 'ja' ? (catJa[c] || c) : c;
      const color = catColors[c] || 'var(--accent)';
      return `<span class="alert-cat-tag" style="border-left:2px solid ${color}">${label}</span>`;
    }).join('');

    const title = LANG === 'ja' ? (a.alert_title || a.topic) : (a.alert_title_en || a.topic);

    html += `
      <div class="alert-item">
        <div class="alert-icon ${typeCls}">${icon}</div>
        <div class="alert-body">
          <div class="alert-topic">
            ${esc(title)}
            <span class="alert-type-badge ${typeCls}">${typeLabel}</span>
            ${detail}
          </div>
          <div class="alert-desc">${esc(desc)}</div>
          <div class="alert-cats">${catTags}</div>
        </div>
      </div>`;
  }

  html += '</div></div>';
  panel.innerHTML = html;
}

// Count alerts per PESTLE category for badge display
function getAlertCountByCategory() {
  if (!ALERTS_DATA || !ALERTS_DATA.alerts) return {};
  const counts = {};
  for (const a of ALERTS_DATA.alerts) {
    for (const cat of (a.categories || [])) {
      counts[cat] = (counts[cat] || 0) + 1;
    }
  }
  return counts;
}

function renderOverview() {
  if (!NEWS_DATA) return;

  const totalNews = Object.values(NEWS_DATA.pestle).reduce((s, c) => s + c.count, 0);
  const totalPapers = PAPERS_DATA.length;
  const sources = new Set();
  Object.values(NEWS_DATA.pestle).forEach(c => c.articles.forEach(a => sources.add(a.source)));
  const fields = {};
  PAPERS_DATA.forEach(p => { fields[p.field] = (fields[p.field] || 0) + 1; });

  document.getElementById('overviewStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">${t('stat_news')}</div><div class="stat-value">${totalNews}</div><div class="stat-sub">${t('stat_sub_news')}</div></div>
    <div class="stat-card"><div class="stat-label">${t('stat_papers')}</div><div class="stat-value">${totalPapers}</div><div class="stat-sub">${Object.keys(fields).length} ${t('field')}</div></div>
    <div class="stat-card"><div class="stat-label">${t('stat_sources')}</div><div class="stat-value">${sources.size}</div><div class="stat-sub">${t('stat_sub_sources')}</div></div>
    <div class="stat-card"><div class="stat-label">${t('stat_date')}</div><div class="stat-value" style="font-size:1rem">${NEWS_DATA.date}</div><div class="stat-sub">${NEWS_DATA.total_fetched}${t('from_selected')}</div></div>
    <div class="stat-card"><div class="stat-label">${t('stat_fields')}</div><div class="stat-value">${Object.keys(fields).length}</div><div class="stat-sub">${Object.entries(fields).map(([f,n]) => f + ':' + n).join(', ')}</div></div>
  `;

  // PESTLE summary (top 3 per category)
  let pestleHtml = '';
  for (const [cat, meta] of Object.entries(PESTLE_META)) {
    const info = NEWS_DATA.pestle[cat];
    if (!info) continue;
    const alertCounts = getAlertCountByCategory();
    const alertBadge = alertCounts[cat] ? `<span class="pestle-alert-badge">\u26a0 ${alertCounts[cat]}</span>` : '';
    pestleHtml += `
      <div class="pestle-section">
        <div class="pestle-header">
          <div class="pestle-badge" style="background:${meta.color}"></div>
          ${meta.icon} ${meta.ja} ${alertBadge}
          <span class="pestle-count">${info.count}件</span>
        </div>
        <div class="article-list">
          ${info.articles.slice(0, 3).map((a, i) => `
            <div class="article-item" onclick="showArticle('${cat}', ${i})">
              <div class="article-title">${esc(localizedTitle(a, cat, i))}</div>
              <div class="article-meta">
                <span class="article-source">${esc(a.source)}</span>
                ${a.published_date ? `<span style="font-size:0.7rem;color:var(--text-muted)">${esc(a.published_date)}</span>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }
  document.getElementById('overviewPestle').innerHTML = pestleHtml;

  // Papers summary (top 2 per field)
  let papersHtml = '';
  const byField = {};
  PAPERS_DATA.forEach((p, i) => { if (!byField[p.field]) byField[p.field] = []; byField[p.field].push({...p, _idx: i}); });

  for (const [field, papers] of Object.entries(byField)) {
    papersHtml += `
      <div class="paper-section">
        <div class="paper-header">
          <span class="paper-field-badge" style="background:${FIELD_COLORS[field] || 'var(--accent)'}">${esc(field)}</span>
          <span class="pestle-count">${papers.length}件</span>
        </div>
        ${papers.slice(0, 2).map(p => `
          <div class="paper-item" style="cursor:pointer" onclick="showPaper(${p._idx})">
            <div class="paper-title">${esc(localizedPaperTitle(p, p._idx))}</div>
            <div class="paper-authors">${esc((p.authors || '').substring(0, 80))}${(p.authors || '').length > 80 ? '...' : ''} ${p.published_date ? `<span style="color:var(--text-muted);font-size:0.7rem">(${esc(p.published_date)})</span>` : ''}</div>
          </div>
        `).join('')}
      </div>`;
  }
  document.getElementById('overviewPapers').innerHTML = papersHtml;
}

// === Render PESTLE ===
function renderPestle() {
  if (!NEWS_DATA) return;
  const q = (document.getElementById('pestleSearch').value || '').toLowerCase();

  let html = '';
  for (const [cat, meta] of Object.entries(PESTLE_META)) {
    const info = NEWS_DATA.pestle[cat];
    if (!info) continue;
    const filtered = q ? info.articles.filter(a => (a.title + a.summary + a.source).toLowerCase().includes(q)) : info.articles;

    html += `
      <div class="pestle-section">
        <div class="pestle-header">
          <div class="pestle-badge" style="background:${meta.color}"></div>
          ${meta.icon} ${meta.ja} (${cat})
          <span class="pestle-count">${filtered.length}件</span>
        </div>
        <div class="article-list">
          ${filtered.map((a, i) => {
            const origIdx = info.articles.indexOf(a);
            return `
              <div class="article-item" onclick="showArticle('${cat}', ${origIdx})">
                <div class="article-title">${esc(localizedTitle(a, cat, origIdx))}</div>
                <div class="article-meta">
                  <span class="article-source">${esc(a.source)}</span>
                  ${a.published_date ? `<span style="font-size:0.7rem;color:var(--text-muted)">${esc(a.published_date)}</span>` : ''}
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }
  document.getElementById('pestleGrid').innerHTML = html;
}

// === Render Papers ===

        </div>
        <div class="article-list">
          ${papers.map(p => `

// === Global Search ===
function renderGlobalSearch() {
  const q = (document.getElementById('globalSearch').value || '').toLowerCase();
  if (!q || q.length < 2) {
    document.getElementById('searchResults').innerHTML = `<div style="color:var(--text-muted);padding:20px;">${t('search_min')}</div>`;
    return;
  }

  let results = [];

  // Search news (search both original and translated text)
  if (NEWS_DATA) {
    for (const [cat, info] of Object.entries(NEWS_DATA.pestle)) {
      info.articles.forEach((a, i) => {
        const tr = getTranslation(cat, i);
        const searchText = [a.title, a.summary, tr?.title_translated, tr?.summary_translated].filter(Boolean).join(' ').toLowerCase();
        if (searchText.includes(q)) {
          results.push({ type: 'news', category: cat, title: localizedTitle(a, cat, i), sub: a.source, idx: i });
        }
      });
    }
  }

  // Search papers (search both original and translated text)
  PAPERS_DATA.forEach((p, i) => {
    const ptr = PAPERS_TRANS[i];
    const searchText = [p.title, p.summary, p.authors, ptr?.title_ja, ptr?.summary_ja].filter(Boolean).join(' ').toLowerCase();
    if (searchText.includes(q)) {
      results.push({ type: 'paper', category: p.field, title: localizedPaperTitle(p, i), sub: (p.authors || '').substring(0, 60), idx: i });
    }
  });

  let html = `<div style="color:var(--text-muted);font-size:0.8rem;margin-bottom:12px">${results.length}${t('found')}</div>`;
  results.forEach(r => {
    const color = r.type === 'news' ? (PESTLE_META[r.category]?.color || 'var(--accent)') : (FIELD_COLORS[r.category] || 'var(--accent)');
    const badge = r.type === 'news' ? (PESTLE_META[r.category]?.ja || r.category) : r.category;
    const onclick = r.type === 'news' ? `showArticle('${r.category}', ${r.idx})` : `showPaper(${r.idx})`;
    html += `
      <div class="article-item" style="background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="${onclick}">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:0.65rem;padding:2px 8px;border-radius:4px;background:${color};color:white">${esc(badge)}</span>
          <span class="lang-badge">${r.type === 'news' ? 'NEWS' : 'PAPER'}</span>
        </div>
        <div class="article-title" style="margin-top:4px">${esc(r.title)}</div>
        <div class="article-meta">${esc(r.sub)}</div>
      </div>`;
  });

  document.getElementById('searchResults').innerHTML = html;
}

// === Render CLA ===
let claCatFilter = 'Overall'; // Default to Overall
let claViewMode = 'timeline'; // 'single' or 'timeline'

function renderCLA() {
  if (!AI_DATA || !AI_DATA.cla) {
    document.getElementById('claGrid').innerHTML = `<div style="color:var(--text-muted);padding:20px;">${t('no_ai')}</div>`;
    return;
  }

  // Collect all available quarters, sorted chronologically
  const qcla = AI_DATA.quarterly_cla || {};
  const quarters = Object.keys(qcla).sort();
  if (quarters.length === 0) quarters.push(AI_DATA.date?.slice(0,7) || '2026-03');

  // Category options: Overall + 6 PESTLE
  const catOptions = [
    { key: 'Overall', label: '全体', icon: '🌐', color: 'var(--accent)' },
    ...Object.entries(PESTLE_META).map(([k, m]) => ({ key: k, label: m.ja, icon: m.icon, color: m.color }))
  ];

  let html = '';

  // Category filter
  html += `<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
    <span style="font-size:0.82rem;color:var(--text-muted);font-weight:600">分野:</span>`;
  catOptions.forEach(opt => {
    const isActive = claCatFilter === opt.key;
    html += `<button onclick="claCatFilter='${opt.key}';renderCLA()" style="padding:5px 12px;border:1px solid ${isActive ? opt.color : 'var(--border)'};border-radius:6px;background:${isActive ? opt.color : 'var(--card)'};color:${isActive ? '#fff' : 'var(--text)'};cursor:pointer;font-size:0.8rem">${opt.icon} ${opt.label}</button>`;
  });
  html += `</div>`;

  // View mode toggle
  html += `<div style="display:flex;gap:6px;margin-bottom:16px;align-items:center">
    <span style="font-size:0.82rem;color:var(--text-muted);font-weight:600">表示:</span>
    <button onclick="claViewMode='timeline';renderCLA()" style="padding:5px 12px;border:1px solid ${claViewMode==='timeline'?'var(--accent)':'var(--border)'};border-radius:6px;background:${claViewMode==='timeline'?'var(--accent)':'var(--card)'};color:${claViewMode==='timeline'?'#fff':'var(--text)'};cursor:pointer;font-size:0.8rem">📊 変遷一覧</button>
    <button onclick="claViewMode='single';renderCLA()" style="padding:5px 12px;border:1px solid ${claViewMode==='single'?'var(--accent)':'var(--border)'};border-radius:6px;background:${claViewMode==='single'?'var(--accent)':'var(--card)'};color:${claViewMode==='single'?'#fff':'var(--text)'};cursor:pointer;font-size:0.8rem">📋 個別表示</button>
  </div>`;

  if (claViewMode === 'timeline') {
    // === Horizontal timeline comparison (card-based) ===
    const layers = [
      { key: 'litany', label: t('layer1'), border: 'var(--accent-warm)' },
      { key: 'systemic_causes', label: t('layer2'), border: 'var(--accent-light)' },
      { key: 'worldview', label: t('layer3'), border: 'var(--accent)' },
      { key: 'myth_metaphor', label: t('layer4'), border: '#2c8acc' },
      { key: 'key_tension', label: '⚡ 核心的緊張', border: 'var(--highlight)' },
      { key: 'emerging_narrative', label: '→ 新たな物語', border: 'var(--S)' },
    ];

    layers.forEach(layer => {
      html += `<div style="margin-bottom:20px">`;
      html += `<div style="font-size:0.88rem;font-weight:700;color:var(--accent);margin-bottom:8px;padding-left:4px;border-left:3px solid ${layer.border}">${layer.label}</div>`;
      html += `<div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:8px">`;
      quarters.forEach(q => {
        const data = qcla[q];
        const catData = data ? data[claCatFilter] : null;
        const text = catData ? (catData[layer.key] || '') : '';
        const label = q.replace('-0', '年').replace('-1', '年1').replace('-', '年') + '月';
        const isCurrent = q === quarters[quarters.length - 1];
        html += `<div style="min-width:240px;max-width:300px;flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;${isCurrent ? 'border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)' : ''}">
          <div style="font-size:0.75rem;font-weight:600;color:${isCurrent ? 'var(--accent)' : 'var(--text-muted)'};margin-bottom:6px">${label}${isCurrent ? '（現在）' : ''}</div>
          <div style="font-size:0.8rem;line-height:1.6;color:var(--text)">${esc(text) || '<span style="color:var(--text-muted)">—</span>'}</div>
        </div>`;
      });
      html += `</div></div>`;
    });

  } else {
    // === Single quarter view ===
    html += `<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
      <span style="font-size:0.82rem;color:var(--text-muted);font-weight:600">四半期:</span>`;
    quarters.forEach((q, i) => {
      const isActive = i === (window._claSingleIdx || quarters.length - 1);
      const label = q.replace('-0', '年').replace('-1', '年1').replace('-', '年') + '月';
      html += `<button onclick="window._claSingleIdx=${i};renderCLA()" style="padding:5px 12px;border:1px solid ${isActive ? 'var(--accent)' : 'var(--border)'};border-radius:6px;background:${isActive ? 'var(--accent)' : 'var(--card)'};color:${isActive ? '#fff' : 'var(--text)'};cursor:pointer;font-size:0.8rem">${label}</button>`;
    });
    html += `</div>`;

    const selIdx = window._claSingleIdx ?? quarters.length - 1;
    const selQ = quarters[selIdx];
    const data = qcla[selQ] || (selIdx === quarters.length - 1 ? AI_DATA.cla : null);

    if (!data || !data[claCatFilter]) {
      html += `<div style="padding:24px;text-align:center;color:var(--text-muted);background:var(--card);border-radius:10px;">データなし</div>`;
    } else {
      const cla = data[claCatFilter];
      const opt = catOptions.find(o => o.key === claCatFilter);
      html += `
        <div class="cla-card">
          <div class="cla-cat-header">
            <div class="pestle-badge" style="background:${opt?.color || 'var(--accent)'}"></div>
            ${opt?.icon || ''} ${opt?.label || claCatFilter}
            <span style="font-size:0.72rem;color:var(--text-muted);margin-left:auto">${selQ}</span>
          </div>
          <div class="cla-layer litany">
            <div class="cla-layer-label">${t('layer1')}</div>
            <div class="cla-layer-text">${esc(cla.litany || '')}</div>
          </div>
          <div class="cla-layer systemic">
            <div class="cla-layer-label">${t('layer2')}</div>
            <div class="cla-layer-text">${esc(cla.systemic_causes || '')}</div>
          </div>
          <div class="cla-layer worldview">
            <div class="cla-layer-label">${t('layer3')}</div>
            <div class="cla-layer-text">${esc(cla.worldview || '')}</div>
          </div>
          <div class="cla-layer myth">
            <div class="cla-layer-label">${t('layer4')}</div>
            <div class="cla-layer-text">${esc(cla.myth_metaphor || '')}</div>
          </div>
          ${cla.key_tension ? `<div class="cla-tension">⚡ ${esc(cla.key_tension)}</div>` : ''}
          ${cla.emerging_narrative ? `<div class="cla-narrative">→ ${esc(cla.emerging_narrative)}</div>` : ''}
        </div>`;
    }
  }
  document.getElementById('claGrid').innerHTML = html;
}

// === Render Weak Signals ===
let signalsShowAll = false;
function renderSignals() {
  if (!AI_DATA || !AI_DATA.weak_signals || AI_DATA.weak_signals.length === 0) {
    document.getElementById('signalsGrid').innerHTML = `<div style="color:var(--text-muted);padding:20px;">${t('no_signals')}</div>`;
    return;
  }

  const allSignals = AI_DATA.weak_signals;
  const displaySignals = signalsShowAll ? allSignals : allSignals.slice(0, 100);

  let html = displaySignals.map(s => `
    <div class="signal-card">
      <div class="signal-header">
        <div class="signal-name">${esc(s.signal)}</div>
        <span class="signal-impact ${(s.potential_impact || '').toLowerCase()}">${esc(s.potential_impact || '?')}</span>
      </div>
      <div class="signal-desc">${esc(s.description)}</div>
      <div class="signal-meta">
        ${s.detected_date ? `<span style="font-size:0.7rem;color:var(--text-muted)">📅 ${esc(s.detected_date)}</span>` : ''}
        ${s.source_date ? `<span style="font-size:0.7rem;color:var(--text-muted)">📅 ${esc(s.source_date)}</span>` : ''}
        <span class="signal-horizon">${esc(s.time_horizon || '?')}</span>
        ${(s.pestle_categories || []).map(c => {
          const m = PESTLE_META[c];
          return m ? `<span style="font-size:0.65rem;padding:2px 6px;border-radius:3px;background:${m.color};color:white">${m.ja}</span>` : `<span class="lang-badge">${esc(c)}</span>`;
        }).join('')}
      </div>
      ${s.counter_trend ? `<div class="signal-counter">↔ ${esc(s.counter_trend)}</div>` : ''}
      ${s.related_headlines && s.related_headlines.length > 0 ? `
        <details style="margin-top:8px;font-size:0.75rem;color:var(--text-muted)">
          <summary style="cursor:pointer">関連記事 (${s.related_headlines.length})</summary>
          <ul style="margin-top:4px;padding-left:16px">
            ${s.related_headlines.map(h => `<li>${esc(h)}</li>`).join('')}
          </ul>
        </details>` : ''}
    </div>
  `).join('');

  if (!signalsShowAll && allSignals.length > 100) {
    html += `<div style="text-align:center;padding:20px"><button onclick="signalsShowAll=true;renderSignals()" style="padding:10px 24px;border:1px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;font-size:0.88rem;color:var(--accent)">さらに表示（残り${allSignals.length - 100}件）</button></div>`;
  }

  document.getElementById('signalsGrid').innerHTML = html;
}

// === Translation helpers ===
function getTranslation(cat, idx) {
  if (!AI_DATA || !AI_DATA.translations || !AI_DATA.translations[cat]) return null;
  return AI_DATA.translations[cat].find(t => t.index === idx);
}

function localizedTitle(article, cat, idx) {
  // In JA mode: if article is English, show translated title
  // In EN mode: show original title
  if (LANG === 'ja' && article.lang === 'en') {
    const tr = getTranslation(cat, idx);
    if (tr && tr.title_translated) return tr.title_translated;
  }
  return article.title;
}

function localizedSummary(article, cat, idx) {
  if (LANG === 'ja' && article.lang === 'en') {
    const tr = getTranslation(cat, idx);
    if (tr && tr.summary_translated) return tr.summary_translated;
  }
  return article.summary;
}

function localizedPaperTitle(paper, idx) {
  if (LANG === 'ja' && (paper.language || 'en') === 'en') {
    const tr = PAPERS_TRANS[idx];
    if (tr && tr.title_ja) return tr.title_ja;
  }
  return paper.title;
}

function localizedPaperSummary(paper, idx) {
  if (LANG === 'ja' && (paper.language || 'en') === 'en') {
    const tr = PAPERS_TRANS[idx];
    if (tr && tr.summary_ja) return tr.summary_ja;
  }
  return paper.summary;
}

// === Load data ===
async function loadData() {
  try {
    const newsResp = await fetch('data/latest.json?v=' + Date.now());
    NEWS_DATA = await newsResp.json();
    document.getElementById('lastUpdated').textContent = `${t('last_updated')}: ${NEWS_DATA.date}`;
  } catch (e) {
    console.warn('News data not found:', e);
  }

  try {
    const papersResp = await fetch('data/papers.json?v=' + Date.now());
    PAPERS_DATA = await papersResp.json();
  } catch (e) {
    console.warn('Papers data not found:', e);
  }

  try {
    const aiResp = await fetch('data/ai_analysis.json?v=' + Date.now());
    AI_DATA = await aiResp.json();
  } catch (e) {
    console.warn('AI analysis data not found:', e);
  }

  try {
    const ptResp = await fetch('data/papers_translations.json?v=' + Date.now());
    const ptData = await ptResp.json();
    ptData.forEach(t => { PAPERS_TRANS[t.index] = t; });
  } catch (e) {
    console.warn('Papers translations not found:', e);
  }

  try {
    const alertsResp = await fetch('data/alerts.json?v=' + Date.now());
    ALERTS_DATA = await alertsResp.json();
  } catch (e) {
    console.warn('Alerts data not found:', e);
  }

  applyI18n();
  renderOverview();
  renderAlerts();
  renderPestle();
  renderPapers();
  renderCLA();
  renderSignals();
}

loadData();
</script>
</body>
</html>
